/* ═══════════════════════════════════════════════════ ÜBERGÄNGE ═══ */
/* Legt sich kurz über den Bildschirm beim Wechsel. "battle" = Kachel-Wisch,
   sonst weiches Abblenden. */
function TransitionOverlay({kind,onCovered,onDone}){
  const [ph,setPh]=useState(0); // 0 = einblenden (zudecken), 1 = aufdecken
  useEffect(()=>{
    const dur=kind==="battle"?420:300;
    const a=setTimeout(()=>{onCovered&&onCovered();setPh(1);},dur);
    const b=setTimeout(()=>{onDone&&onDone();},dur*2);
    return()=>{clearTimeout(a);clearTimeout(b);};
  },[]);
  if(kind==="battle"){
    const cols=6,rows=8,cells=[];
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      const delay=((r+c)%(rows+cols))*22;
      cells.push(
        <div key={r+"-"+c} style={{
          background:"#041427",
          animation:`${ph===0?"tileIn":"tileOut"} .26s ease-in-out ${delay}ms both`}}/>
      );
    }
    return(
      <div style={{position:"fixed",inset:0,zIndex:500,pointerEvents:"none",
        display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gridTemplateRows:`repeat(${rows},1fr)`}}>
        <style>{`@keyframes tileIn{from{transform:scale(0);opacity:.2}to{transform:scale(1.05);opacity:1}}
                 @keyframes tileOut{from{transform:scale(1.05);opacity:1}to{transform:scale(0);opacity:0}}`}</style>
        {cells}
      </div>
    );
  }
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,pointerEvents:"none",background:"#020c18",
      animation:`${ph===0?"fadeCover":"fadeReveal"} .3s ease-in-out both`}}>
      <style>{`@keyframes fadeCover{from{opacity:0}to{opacity:1}}
               @keyframes fadeReveal{from{opacity:1}to{opacity:0}}`}</style>
    </div>
  );
}

function AquariumMon(){
  const [scr,setScr]=useState("title");
  const [player,setPlayer]=useState(null);
  const [dlg,setDlg]=useState(null);
  const [curCity,setCurCity]=useState(null);
  const [battle,setBattle]=useState(null);
  const [showMenu,setShowMenu]=useState(false);
  const [savedName,setSavedName]=useState(null);
  const [toast,setToast]=useState("");
  const [evolving,setEvolving]=useState(null); // {loc,idx,fromKey,toKey}
  const evoReturnRef=useRef("overworld");
  const toastTRef=useRef(null);
  function showToast(txt,ms=2600){setToast(txt);clearTimeout(toastTRef.current);toastTRef.current=setTimeout(()=>setToast(""),ms);}
  // XP an alle Team-Mons vergeben, Level-Ups sammeln
  function awardXp(amount){
    setPlayer(p=>{
      if(!p)return p;
      const ups=[];
      const team=p.team.map(m=>{const nm=grantXp(m,amount);if(nm._leveled)ups.push(`${nm.name} → Lv${nm.level}!`);delete nm._leveled;return nm;});
      if(ups.length)AUDIO.sfx("levelup");
      setTimeout(()=>showToast(ups.length?`⭐ ${ups.join("  ")}`:`+${amount} EP fürs Team`),0);
      return{...p,team};
    });
  }

  // Check for existing save on mount
  useEffect(()=>{loadSave().then(s=>{if(s)setSavedName(s.name);});},[]);

  // Audio bei der ersten Nutzergeste freischalten (iOS/Chrome verlangen das)
  useEffect(()=>{
    const unlock=()=>{AUDIO.unlock();AUDIO.resume();};
    window.addEventListener("pointerdown",unlock,{passive:true});
    window.addEventListener("keydown",unlock);
    window.addEventListener("touchstart",unlock,{passive:true});
    return()=>{window.removeEventListener("pointerdown",unlock);window.removeEventListener("keydown",unlock);window.removeEventListener("touchstart",unlock);};
  },[]);

  // Passende Musik je Bildschirm
  useEffect(()=>{
    let track=null;
    if(scr==="overworld")track="overworld";
    else if(scr==="city"||scr==="fishing")track="city";
    else if(scr==="battle")track=battle?.walox?"legend":(battle?.rival||battle?.isTrainer)?"boss":"battle";
    else if(scr==="legend"||scr==="rivalwin"||scr==="bregenzwin")track="victory";
    if(track)AUDIO.playMusic(track,true);else AUDIO.stopMusic(true);
  },[scr,battle]);

  // Auto-save when player changes
  useEffect(()=>{
    if(player&&scr!=="title"&&scr!=="character"){
      saveGame({...player,owX:OW.pos.x,owY:OW.pos.y,owFacing:OW.facing})
        .then(()=>setSavedName(player.name));
    }
  },[player]);

  // Bildschirmwechsel mit Übergang. Der Zielbildschirm wird erst gesetzt,
  // wenn der Vorhang zu ist – so sieht man kein Springen.
  const [trans,setTrans]=useState(null); // {kind,to,phase:"in"|"out"}
  const scrRef=useRef(scr);scrRef.current=scr;
  const FADE_TO=new Set(["overworld","city","battle","fishing","legend","rivalend","rivalwin","bregenzwin","credits"]);
  function go(target){
    if(scrRef.current===target)return;
    if(!FADE_TO.has(target)){setScr(target);return;}   // Menüs/Dialoge: sofort
    setTrans({kind:target==="battle"?"battle":"fade",to:target,phase:"in"});
  }
  // Vorhang ist zu → Bildschirm wechseln, dann Vorhang öffnen
  function transCovered(){
    setTrans(t=>{
      if(!t)return null;
      setScr(t.to);
      return {...t,phase:"out"};
    });
  }
  function transDone(){setTrans(null);}
  function showDlg(events,cb){setDlg({events,idx:0,cb});go("dialogue");}
  function nextDlg(){const next=dlg.idx+1;if(next>=dlg.events.length){const cb=dlg.cb;setDlg(null);if(cb)cb();}else setDlg(d=>({...d,idx:next}));}

  function startNew(){OW.pos={x:18*TS+TS/2,y:27*TS+TS/2};OW.facing="left";go("character");}
  function onCharDone(name,gender){
    setPlayer({name,gender,team:[],box:[],caught:[],seen:[],beaten:[],baits:[],rods:5,waloxUnlocked:false,waloxDefeated:false});
    showDlg(DLGS[0],()=>go("starter"));
  }
  function onStarterPick(key){
    setPlayer(p=>p?({...p,team:[mkMon(key)],caught:[key],seen:[key]}):p);
    showDlg([
      {spk:"Prof. Seestern",ico:"🧑‍🔬",txt:`Ausgezeichnete Wahl! ${MONS[key].name} wird dir treu zur Seite stehen.`},
      {spk:(player?.name||"Du"),ico:"🎣",txt:"Auf zum Abenteuer! [WASD / Pfeiltasten zum Laufen]"},
    ],()=>go("overworld"));
  }
  async function loadGame(){
    const s=await loadSave();
    if(!s)return;
    if(s.owX){OW.pos={x:s.owX,y:s.owY};OW.facing=s.owFacing||"left";}
    // backfill new fields for old saves (Box, Level/XP)
    const fix=m=>({level:1,xp:0,...m,maxHp:m.maxHp||scaleStat(MONS[m.key]?.maxHp||40,m.level||1)});
    const merged={seen:s.caught?[...s.caught]:[],baits:[],waloxUnlocked:false,waloxDefeated:false,box:[],musicOn:true,sfxOn:true,...s};
    AUDIO.setMusic(merged.musicOn!==false);AUDIO.setSfx(merged.sfxOn!==false);
    merged.team=(merged.team||[]).map(fix);merged.box=(merged.box||[]).map(fix);
    setPlayer(merged);go("overworld");
  }

  // Neues Aquariummon erhalten: ins Team wenn Platz, sonst in die Box. Duplikate ignorieren.
  function gainMon(mon){
    setPlayer(p=>{
      if(!p)return p;
      const owned=[...p.team,...(p.box||[])].some(m=>m.key===mon.key);
      const caught=p.caught.includes(mon.key)?p.caught:[...p.caught,mon.key];
      const seen=(p.seen||[]).includes(mon.key)?p.seen:[...(p.seen||[]),mon.key];
      if(owned)return{...p,caught,seen}; // schon vorhanden – nur Dex-Eintrag sichern
      if(p.team.length<3)return{...p,team:[...p.team,mon],caught,seen};
      if((p.box||[]).length<BOX_MAX)return{...p,box:[...(p.box||[]),mon],caught,seen};
      return{...p,caught,seen}; // kein Platz – nur Dex (sollte durch Gating nicht passieren)
    });
  }
  function toBox(i){setPlayer(p=>{if(!p||p.team.length<=1||(p.box||[]).length>=BOX_MAX)return p;const team=[...p.team];const[m]=team.splice(i,1);return{...p,team,box:[...(p.box||[]),m]};});}
  function toTeam(i){setPlayer(p=>{if(!p||p.team.length>=3)return p;const box=[...(p.box||[])];const[m]=box.splice(i,1);if(!m)return p;return{...p,team:[...p.team,m],box};});}
  function reorderTeam(from,to){setPlayer(p=>{if(!p)return p;const t=[...p.team];if(to<0||to>=t.length)return p;const[m]=t.splice(from,1);t.splice(to,0,m);return{...p,team:t};});}
  function releaseBox(i){setPlayer(p=>{if(!p)return p;const box=[...(p.box||[])];const[m]=box.splice(i,1);if(m)setTimeout(()=>showToast(`${m.name} wurde freigelassen.`),0);return{...p,box};});}
  // Entwicklung starten (Level-3-Starter) → Sequenz-Screen
  function onEvolve(loc,idx){
    const src=(loc==="team"?player.team:player.box)||[];
    const m=src[idx];if(!m||!EVO[m.key]||(m.level||1)<MAXLV)return;
    evoReturnRef.current=scr;
    setEvolving({loc,idx,fromKey:m.key,toKey:EVO[m.key]});
    setShowMenu(false);go("evolve");
  }
  function applyEvolve(){
    if(!evolving)return;
    AUDIO.sfx("evolve");
    const {loc,idx,toKey}=evolving;
    setPlayer(p=>{
      if(!p)return p;
      const arr=[...(loc==="team"?p.team:p.box)];
      const old=arr[idx];if(!old){return p;}
      const nm=mkMon(toKey,MAXLV);nm.xp=LV_XP[MAXLV-1]||0; // bleibt auf Max-Level
      arr[idx]=nm;
      const caught=p.caught.includes(toKey)?p.caught:[...p.caught,toKey];
      const seen=(p.seen||[]).includes(toKey)?p.seen:[...(p.seen||[]),toKey];
      return loc==="team"?{...p,team:arr,caught,seen}:{...p,box:arr,caught,seen};
    });
    const ret=evoReturnRef.current;setEvolving(null);go(ret==="city"?"city":"overworld");
  }
  // Prof. Seestern (Konstanz) → Parole-Eingabe
  function onSeestern(){go("parole");}
  function devUnlockAll(){
    setPlayer(p=>{
      if(!p)return p;
      const allKeys=[...BASE_KEYS,"walox"];
      const box=allKeys.map(k=>mkMon(k,MAXLV)); // alle auf Max-Level, unentwickelt
      const caught=Array.from(new Set([...(p.caught||[]),...allKeys]));
      const seen=Array.from(new Set([...(p.seen||[]),...allKeys]));
      const beaten=CITIES.filter(c=>!c.rival).map(c=>c.id); // alle Städte-Bosse, nicht Yuri
      const baits=Object.keys(BAITS);
      return{...p,box:box.slice(0,BOX_MAX),caught,seen,beaten,baits,waloxUnlocked:true,waloxDefeated:true};
    });
    setTimeout(()=>showToast("🔧 Entwickler-Testmodus aktiviert!",3200),60);
    setCurCity(null);go("overworld");
  }
  // Kein Platz für ein neues Aquariummon (Team voll UND Box voll)
  const noRoom=(player?.team?.length||0)>=3 && (player?.box?.length||0)>=BOX_MAX;

  function enterTown(city){AUDIO.sfx("door");setCurCity(city);go("city");}
  function fightTrainer(city){
    const B=city.boss;
    if(city.rival){
      // Yuri ist immer besiegbar, aber die härteste Prüfung im Spiel
      const evoCount=STARTER_EVOS.filter(k=>(player?.team||[]).some(m=>m.key===k)).length;
      const tough=(B.tough||1.3)*(1-evoCount*0.06); // mit entwickelten Startern etwas milder
      const rivalMons=B.mons.map(k=>{const m=mkMon(k,B.lv||3);m.maxHp=m.hp=Math.round(m.maxHp*tough);m.atk=Math.round(m.atk*(1+(tough-1)*0.55));return m;});
      setBattle({isTrainer:true,trainerName:B.name,enemies:rivalMons,cityId:null,finale:false,rival:true});
      showDlg(evoCount===3?[
        {spk:B.name,ico:"🥷",txt:"Du kommst mit voll entwickelten Startern? Endlich ein echtes Duell!"},
        {spk:(player?.name||"Du"),ico:"🎣",txt:"Koidrako, Barrakoloss, Salmorai — machen wir's, Yuri!"},
      ]:[
        {spk:B.name,ico:"🥷",txt:"Ah, der berühmte Angler vom Bodensee. Ich bin Yuri, dein Rivale."},
        {spk:B.name,ico:"🥷",txt:"Meine Aquariummon sind alle voll entwickelt. Zeig mir, was du draufhast!"},
        {spk:(player?.name||"Du"),ico:"🎣",txt:"Das werden wir sehen!"},
      ],()=>go("battle"));
      return;
    }
    // Städte-Bosse: steigende Level, größere Teams, mehr Zähigkeit
    const t=B.tough||1;
    const bossMons=B.mons.map(k=>{const m=mkMon(k,B.lv||1);m.maxHp=m.hp=Math.round(m.maxHp*t);m.atk=Math.round(m.atk*(1+(t-1)*0.6));return m;});
    setBattle({isTrainer:true,trainerName:B.name,enemies:bossMons,cityId:city.id,finale:!!city.finale,bait:city.bait});
    DLGS[city.si]?showDlg(DLGS[city.si],()=>go("battle")):go("battle");
  }
  function centerHeal(){AUDIO.sfx("heal");setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:m.maxHp}))}):p);}
  function exitCity(){if(curCity){OW.pos={x:curCity.ex*TS+TS/2,y:curCity.ey*TS+TS/2};OW.facing="down";}setCurCity(null);go("overworld");}
  function markSeen(monKey){setPlayer(p=>p&&!(p.seen||[]).includes(monKey)?({...p,seen:[...(p.seen||[]),monKey]}):p);}
  function owWild(monKey){
    markSeen(monKey);
    // Wilde Aquariummon wachsen mit dem Fortschritt mit (Anzahl Köder = Fortschritt)
    const prog=(player?.baits||[]).length;
    const lv=prog>=4?3:prog>=2?2:1;
    setBattle({isTrainer:false,enemies:[mkMon(monKey,lv)],cityId:null,finale:false});go("battle");
  }
  function startWalox(){
    showDlg([
      {spk:"???",ico:"🌊",txt:"Das Wasser der Seemitte beginnt zu brodeln..."},
      {spk:"Walox",ico:"🐳",txt:"Ein gewaltiger Schatten steigt empor — der legendäre Walox!"},
      {spk:(player?.name||"Du"),ico:"🎣",txt:"Als bester Angler nehme ich die Herausforderung an!"},
    ],()=>{
      const w=mkMon("walox",3);
      w.maxHp=w.hp=Math.round(w.maxHp*1.4);w.atk=Math.round(w.atk*1.1);w.def=Math.round(w.def*1.1);
      setBattle({isTrainer:true,trainerName:"⭐ Legendär",enemies:[w],cityId:null,finale:false,walox:true});go("battle");
    });
  }
  // Strudel betreten (nachdem Walox bezwungen) → Bester-Angler-Bildschirm
  function enterStrudel(){go("legend");}
  function continuePlaying(){setCurCity(null);go("overworld");}
  // Nach dem Bester-Angler-Bildschirm: Hinweis auf Ravensburg & weitere Seen
  function legendContinue(){
    setCurCity(null);
    showDlg([
      {spk:"Prof. Seestern",ico:"🧑‍🔬",txt:"Du hast Walox bezwungen — der beste Angler am ganzen Bodensee!"},
      {spk:"Prof. Seestern",ico:"🧑‍🔬",txt:"Im Norden liegt Ravensburg. Dort soll ein starker Rivale auf dich warten."},
      {spk:"Prof. Seestern",ico:"🧑‍🔬",txt:"Und denk dran: Der Bodensee ist nicht der einzige See. Sieh dich ruhig weiter um!"},
    ],()=>go("overworld"));
  }

  function onBattleWin(cityId,isFinale,caughtMon){
    AUDIO.sfx("win");
    const enemyLv=(battle?.enemies||[]).reduce((a,e)=>a+(e.level||1),0)||1;
    const xpGain=battle?.walox?420:battle?.rival?400:battle?.isTrainer?(40*enemyLv):(26*(battle?.enemies?.[0]?.level||1));
    awardXp(xpGain);
    if(caughtMon)gainMon(caughtMon);
    if(cityId)setPlayer(p=>{
      const beaten=p.beaten.includes(cityId)?p.beaten:[...p.beaten,cityId];
      const bait=battle?.bait;
      const baits=bait&&!(p.baits||[]).includes(bait)?[...(p.baits||[]),bait]:(p.baits||[]);
      return{...p,beaten,baits};
    });
    setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:Math.min(m.maxHp,m.hp+Math.floor(m.maxHp*.15))}))}):p);
    // Rivale Yuri bezwungen (nur mit 3 entwickelten Startern möglich)
    if(battle?.rival){go("rivalwin");return;}
    // Walox bezwungen → er bittet darum, dem Team beizutreten
    if(battle?.walox){
      setPlayer(p=>p?({...p,waloxDefeated:true}):p);
      showDlg([
        {spk:"Walox",ico:"🐳",txt:"Du hast mich im ehrlichen Kampf bezwungen, Angler."},
        {spk:"Walox",ico:"🐳",txt:"Selten traf ich auf solche Stärke. Ich möchte fortan an DEINER Seite kämpfen!"},
        {spk:"Walox",ico:"🐳",txt:"Nimm mich in dein Team auf — gemeinsam beschützen wir den Bodensee."},
        {spk:(player?.name||"Du"),ico:"🎣",txt:"Willkommen im Team, Walox!"},
      ],()=>{gainMon(mkMon("walox",3));setTimeout(()=>showToast("🐳 Walox ist deinem Team beigetreten!",3200),60);go("overworld");});
      return;
    }
    if(isFinale){setPlayer(p=>p?({...p,waloxUnlocked:true}):p);go("bregenzwin");return;}
    if(curCity)go("city");else go("overworld");
  }
  function onFishCaught(k){AUDIO.sfx("catch");gainMon(mkMon(k));setPlayer(p=>p?({...p,rods:p.rods-1}):p);go("city");}
  function onGameOver(){
    AUDIO.sfx("lose");
    setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:Math.floor(m.maxHp*.5)}))}):p);
    if(battle?.rival){go("rivalend");return;} // gegen den Rivalen verloren → Ausblick/Feedback
    go(battle?.walox?"overworld":curCity?"city":"overworld");
  }
  async function doSave(){if(player)await saveGame({...player,owX:OW.pos.x,owY:OW.pos.y,owFacing:OW.facing});}
  // Nach Bregenz-Sieg zurück in die Welt, Spieler erscheint am Bregenz-Ausgang
  function continueAfterBregenz(){const b=CITIES.find(c=>c.id==="bregenz");if(b){OW.pos={x:b.ex*TS+TS/2,y:b.ey*TS+TS/2};OW.facing="down";}setCurCity(null);go("overworld");}

  const baitBonus=(player?.baits||[]).reduce((s,bk)=>s+(BAITS[bk]?.bonus||0),0);
  // Bregenz (Finale) erst betretbar, wenn alle 4 anderen Köder gesammelt sind
  function cityEntryGate(city){
    if(city.id==="bregenz"){
      const need=["wurm","insekt","spinner","blinker"];
      const have=player?.baits||[];
      const missing=need.filter(b=>!have.includes(b));
      if(missing.length>0) return `🔒 Bregenz versiegelt! Erst alle ${need.length} Köder sammeln (${need.length-missing.length}/${need.length}).`;
    }
    if(city.id==="ravensburg"&&!player?.waloxDefeated){
      return "🔒 Ravensburg ist noch verschlossen. Beweise dich erst überall am Bodensee.";
    }
    return null;
  }

  return(
    <div style={{width:"100%",height:"100dvh",overflow:"hidden",fontFamily:"'Press Start 2P',monospace",background:"#020c18"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');*{box-sizing:border-box;margin:0;padding:0}button{cursor:pointer}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0e4a7a}@keyframes monIdle{from{transform:translateY(0)}to{transform:translateY(-5px)}}`}</style>
      {scr==="title"    &&<TitleScreen onNewGame={startNew} onLoad={loadGame} savedName={savedName}/>}
      {scr==="character"&&<CharacterScreen onDone={onCharDone}/>}
      {scr==="starter"  &&player&&<StarterScreen playerName={player.name} onPick={onStarterPick}/>}
      {scr==="dialogue" &&dlg&&<DialogueScreen state={dlg} playerName={player?.name} playerGender={player?.gender} onNext={nextDlg}/>}
      {scr==="overworld"&&player&&<OverworldScreen player={player} onEnterTown={enterTown} onWild={owWild} onMenu={()=>setShowMenu(true)} canEnter={cityEntryGate} onWalox={startWalox} onStrudel={enterStrudel}/>}
      {scr==="city"     &&curCity&&player&&<CityInterior city={curCity} player={player} beaten={player.beaten.includes(curCity.id)} onArena={()=>fightTrainer(curCity)} onCenter={centerHeal} onFish={()=>go("fishing")} onExit={exitCity} onMenu={()=>setShowMenu(true)} onSeestern={onSeestern}/>}
      {scr==="fishing"  &&curCity&&player&&<FishingScreen city={curCity} baitBonus={baitBonus} onCaught={onFishCaught} onBack={()=>go("city")}/>}
      {scr==="battle"   &&battle&&player&&<BattleScreen data={battle} player={player} onWin={onBattleWin} onLose={onGameOver}/>}
      {scr==="evolve"   &&evolving&&<EvolveScreen fromKey={evolving.fromKey} toKey={evolving.toKey} onDone={applyEvolve}/>}
      {scr==="parole"   &&<ParoleScreen onSubmit={devUnlockAll} onCancel={()=>go(curCity?"city":"overworld")}/>}
      {scr==="bregenzwin"&&<CreditsScreen onRestart={continueAfterBregenz}/>}
      {scr==="legend"   &&<LegendScreen onRestart={()=>{deleteSave();setPlayer(null);setSavedName(null);go("title");}} onContinue={legendContinue}/>}
      {scr==="rivalend" &&<RivalEndScreen onContinue={continuePlaying}/>}
      {scr==="rivalwin" &&<RivalWinScreen onContinue={continuePlaying}/>}
      {showMenu&&player&&<MenuScreen player={player} onClose={()=>setShowMenu(false)} onSave={doSave} onToBox={toBox} onToTeam={toTeam} onRelease={releaseBox} onEvolve={onEvolve} onReorder={reorderTeam} onAudio={(mu,sx)=>setPlayer(p=>p?({...p,musicOn:mu,sfxOn:sx}):p)}/>}
      {toast&&<div style={{position:"fixed",top:"calc(env(safe-area-inset-top, 0px) + 10px)",left:"50%",transform:"translateX(-50%)",zIndex:300,background:"rgba(2,12,24,.95)",border:"1px solid #a78bfa",color:"#ddd6fe",fontSize:"clamp(6px,1.2vw,10px)",fontFamily:"'Press Start 2P',monospace",padding:"8px 14px",borderRadius:6,whiteSpace:"nowrap",boxShadow:"0 0 18px #7c3aed55"}}>{toast}</div>}
      {trans&&<ScreenTransition trans={trans} onCovered={transCovered} onDone={transDone}/>}
    </div>
  );
}

try{
  const rootEl=document.getElementById('root');
  const root = ReactDOM.createRoot(rootEl);
  root.render(<AquariumMon/>);
  const l=document.getElementById('loading'); if(l)l.style.display='none';
}catch(e){
  showErr(e.message||String(e));
}
</script>

<script>
// If after 6s React/Babel never ran (e.g. blocked CDN), surface a helpful message
setTimeout(function(){
  if(window.__failed)return;
  if(typeof React==='undefined'||typeof ReactDOM==='undefined'){showErr('React/Babel wurden nicht geladen (CDN blockiert?). Seite neu laden oder anderes Netz versuchen.');return;}
  var l=document.getElementById('loading');
  if(l&&l.style.display!=='none'){showErr('Das Spiel konnte nicht initialisiert werden. Bitte Seite neu laden.');}
},6000);
</script>
</body>
</html>
