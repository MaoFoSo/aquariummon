/* ═══════════════════════════════════════════════════ AUDIO (Chiptune) ═══
   Alles wird per Web Audio erzeugt – keine externen Dateien.
   Browser erlauben Ton erst nach einer Nutzergeste → AUDIO.unlock().        */
const AUDIO={
  ctx:null, master:null, musicGain:null, sfxGain:null,
  musicOn:true, sfxOn:true,
  _timer:null, _track:null, _step:0, _unlocked:false,

  unlock(){
    if(this._unlocked)return;
    try{
      const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
      this.ctx=new AC();
      this.master=this.ctx.createGain();this.master.gain.value=0.5;this.master.connect(this.ctx.destination);
      this.musicGain=this.ctx.createGain();this.musicGain.gain.value=this.musicOn?0.22:0;this.musicGain.connect(this.master);
      this.sfxGain=this.ctx.createGain();this.sfxGain.gain.value=this.sfxOn?0.5:0;this.sfxGain.connect(this.master);
      this._unlocked=true;
      if(this._track)this.playMusic(this._track,true);
    }catch(e){}
  },
  resume(){if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume().catch(()=>{});},
  setMusic(on){this.musicOn=on;if(this.musicGain)this.musicGain.gain.value=on?0.22:0;if(!on)this.stopMusic(true);else if(this._track)this.playMusic(this._track,true);},
  setSfx(on){this.sfxOn=on;if(this.sfxGain)this.sfxGain.gain.value=on?0.5:0;},

  // Einzelner Ton
  tone(freq,dur,type="square",when=0,vol=1,dest=null){
    if(!this.ctx||!this._unlocked)return;
    const t0=this.ctx.currentTime+when;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.001,vol),t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(dest||this.sfxGain);
    o.start(t0);o.stop(t0+dur+0.03);
  },
  // Gleitender Ton (für Sprünge/Fanfaren)
  slide(f1,f2,dur,type="square",when=0,vol=0.8){
    if(!this.ctx||!this._unlocked)return;
    const t0=this.ctx.currentTime+when;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f1,t0);o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(this.sfxGain);o.start(t0);o.stop(t0+dur+0.03);
  },
  // Rauschen (Treffer, Wasser, Schritte)
  noise(dur,when=0,vol=0.4,filterHz=1200){
    if(!this.ctx||!this._unlocked)return;
    const t0=this.ctx.currentTime+when;
    const n=Math.floor(this.ctx.sampleRate*dur);
    const buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const src=this.ctx.createBufferSource();src.buffer=buf;
    const f=this.ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=filterHz;
    const g=this.ctx.createGain();g.gain.value=vol;
    src.connect(f);f.connect(g);g.connect(this.sfxGain);
    src.start(t0);
  },

  sfx(name){
    if(!this._unlocked||!this.sfxOn)return;
    this.resume();
    const S={
      click:   ()=>this.tone(880,0.05,"square",0,0.5),
      back:    ()=>this.tone(440,0.07,"square",0,0.45),
      step:    ()=>this.noise(0.05,0,0.12,600),
      encounter:()=>{[0,.09,.18].forEach((d,i)=>this.tone([523,659,880][i],0.1,"square",d,0.6));this.noise(0.3,0.26,0.25,2200);},
      hit:     ()=>{this.noise(0.14,0,0.42,1600);this.tone(180,0.1,"sawtooth",0,0.4);},
      crit:    ()=>{this.noise(0.2,0,0.5,2600);this.slide(420,120,0.22,"sawtooth",0,0.5);},
      hurt:    ()=>{this.slide(300,90,0.2,"square",0,0.4);},
      faint:   ()=>{this.slide(500,60,0.5,"triangle",0,0.5);},
      buff:    ()=>{[523,659,784].forEach((f,i)=>this.tone(f,0.1,"triangle",i*0.06,0.4));},
      cast:    ()=>{this.slide(200,700,0.22,"sine",0,0.35);this.noise(0.12,0.18,0.18,900);},
      reel:    ()=>{this.tone(660,0.05,"square",0,0.4);this.tone(880,0.05,"square",0.06,0.4);},
      catch:   ()=>{[659,784,988,1319].forEach((f,i)=>this.tone(f,0.13,"square",i*0.09,0.5));},
      levelup: ()=>{[523,659,784,1047].forEach((f,i)=>this.tone(f,0.14,"triangle",i*0.08,0.5));},
      evolve:  ()=>{[392,494,587,784,988].forEach((f,i)=>this.tone(f,0.18,"triangle",i*0.11,0.45));},
      win:     ()=>{[523,523,523,659,784].forEach((f,i)=>this.tone(f,i===4?0.4:0.12,"square",i*0.11,0.5));},
      lose:    ()=>{[392,349,294,220].forEach((f,i)=>this.tone(f,0.24,"triangle",i*0.16,0.45));},
      door:    ()=>{this.slide(160,420,0.16,"square",0,0.4);},
      heal:    ()=>{[659,784,1047].forEach((f,i)=>this.tone(f,0.16,"sine",i*0.1,0.42));},
      deny:    ()=>{this.tone(200,0.14,"square",0,0.4);this.tone(150,0.16,"square",0.13,0.4);},
      legend:  ()=>{[131,165,196,262].forEach((f,i)=>this.tone(f,0.5,"sawtooth",i*0.16,0.4));this.noise(0.8,0.3,0.3,500);},
    };
    (S[name]||S.click)();
  },

  /* ── Musik: kurze Schleifen aus Bass + Melodie ── */
  playMusic(track,force){
    this._track=track;
    if(!this._unlocked||!this.musicOn)return;
    if(this._timer&&!force)return;
    this.resume();
    this.stopMusic();
    const T=MUSIC[track];if(!T)return;
    this._step=0;
    const stepMs=T.tempo;
    this._timer=setInterval(()=>{
      if(!this.ctx||!this.musicOn)return;
      const i=this._step%T.mel.length;
      const mn=T.mel[i], bn=T.bass[i%T.bass.length];
      if(mn)this.tone(mn,stepMs/1000*0.9,T.wave||"square",0,0.5,this.musicGain);
      if(bn)this.tone(bn,stepMs/1000*1.5,"triangle",0,0.42,this.musicGain);
      this._step++;
    },stepMs);
  },
  stopMusic(hard){if(this._timer){clearInterval(this._timer);this._timer=null;}if(hard)this._track=null;},
};

/* ═══════════════════════════════════════════════════ MAP ENGINE ═══ */
const MAP_W=58,MAP_H=38,TS=32;
const T_TREE=0,T_GRASS=1,T_PATH=2,T_WATER=3,T_SAND=4,T_HOUSE=10,T_OWPIER=11,T_WALOX=12,T_RAVENS=13;
const WALOX_TILE={x:33,y:20}; // Stand am Stegende, von dem aus Walox in der Seemitte erscheint
function buildMap(){
  const m=Array.from({length:MAP_H},()=>new Uint8Array(MAP_W).fill(T_GRASS));
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++)if(x<2||x>=MAP_W-2||y<2||y>=MAP_H-2)m[y][x]=T_TREE;
  [[3,3,5,4],[27,2,8,3],[50,3,6,4],[2,26,4,8],[52,26,4,8]].forEach(([x,y,w,h])=>{
    for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)if(m[y+dy])m[y+dy][x+dx]=T_TREE;
  });
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const a=(x-27)/17,b=(y-19)/7,c=(x-40)/12,d=(y-20)/5.5;
    if(a*a+b*b<1||c*c+d*d<0.88)m[y][x]=T_WATER;
  }
  const snap=m.map(r=>new Uint8Array(r));
  for(let y=1;y<MAP_H-1;y++)for(let x=1;x<MAP_W-1;x++)
    if(snap[y][x]===T_GRASS&&[[0,1],[0,-1],[1,0],[-1,0]].some(([dy,dx])=>snap[y+dy]?.[x+dx]===T_WATER))m[y][x]=T_SAND;

  const addV=(x,y1,y2)=>{for(let y=y1;y<=y2;y++)if(m[y]?.[x]!==T_WATER&&m[y]?.[x]!==T_TREE)m[y][x]=T_PATH;};
  addH(11,4,54);addH(27,4,54);addV(8,11,27);
  // Ravensburg (Inland-Stadt im Norden) mit Anbindung an die Nordroute
  addV(20,6,11);
  for(let dy=0;dy<2;dy++)for(let dx=0;dx<5;dx++)if(m[3+dy]?.[18+dx]!==undefined&&m[3+dy][18+dx]!==T_WATER)m[3+dy][18+dx]=T_HOUSE;
  m[5][20]=T_RAVENS;
  // Steg von der Südküste in die Seemitte (über Wasser, begehbar)
  for(let y=21;y<=26;y++)m[y][WALOX_TILE.x]=T_OWPIER;
  m[WALOX_TILE.y][WALOX_TILE.x]=T_WALOX;
  [[5,14,27,12,29,5,3],[6,10,11,8,5,5,6],[7,30,11,28,4,6,7],[8,47,11,45,5,5,6],[9,50,27,48,29,5,3]]
    .forEach(([tile,ex,ey,bx,by,bw,bh])=>{
      for(let dy=0;dy<bh;dy++)for(let dx=0;dx<bw;dx++)if(m[by+dy]?.[bx+dx]!==undefined&&m[by+dy][bx+dx]!==T_WATER)m[by+dy][bx+dx]=T_HOUSE;
      if(m[ey]?.[ex]!==undefined)m[ey][ex]=tile;
    });
  return m;
}

function buildCityMap(id){
  const P=CITY_PLANS[id]||CITY_PLANS.konstanz;
  return P.plan.map(row=>{
    const arr=new Uint8Array(KW);
    for(let x=0;x<KW;x++)arr[x]=CH[row[x]]??T_GRASS;
    return arr;
  });
}
const CITY_MAPS={};Object.keys(CITY_PLANS).forEach(id=>{CITY_MAPS[id]=buildCityMap(id);});
function cityMap(id){return CITY_MAPS[id]||CITY_MAPS.konstanz;}
function cityMarks(id){return (CITY_PLANS[id]||CITY_PLANS.konstanz).marks||[];}
function cityLamps(id){return (CITY_PLANS[id]||CITY_PLANS.konstanz).lamps||[];}
// Startposition = direkt über der Ausgangskachel
function cityEntryPos(id){
  const M=cityMap(id);
  let ex=-1,ey=-1;
  for(let y=KH-1;y>=0&&ex<0;y--)for(let x=0;x<KW;x++)if(M[y][x]===K_EXIT){ex=x;ey=y;break;}
  if(ex<0)return {pos:{x:10*KTS+KTS/2,y:12*KTS+KTS/2},facing:"up"};
  // Ringsuche um den Ausgang nach dem nächsten begehbaren Feld (Ausgang selbst ausgenommen)
  for(let r=1;r<=6;r++)
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      if(Math.max(Math.abs(dx),Math.abs(dy))!==r)continue;
      const nx=ex+dx,ny=ey+dy;
      if(nx<0||ny<0||nx>=KW||ny>=KH)continue;
      const t=M[ny][nx];
      if(t===K_EXIT||SOLID.has(t))continue;
      return {pos:{x:nx*KTS+KTS/2,y:ny*KTS+KTS/2},facing:dy>0?"up":"down"};
    }
  return {pos:{x:ex*KTS+KTS/2,y:ey*KTS+KTS/2},facing:"up"};
}

function drawCityTile(ctx,t,px,py,S,fr,gx=0,gy=0){
  if(t===K_ARENA){
    // Arena: Steinbau mit Säulen und Wimpel
    ctx.fillStyle="#7c2d12";ctx.fillRect(px,py,S,S);

    ctx.fillStyle="#78716c";for(let i=0;i<3;i++)ctx.fillRect(px+3+i*(S*.32),py+S*.38,S*.13,S*.55);
    ctx.fillStyle="#b91c1c";ctx.beginPath();ctx.moveTo(px,py+S*.32);ctx.lineTo(px+S/2,py+2);ctx.lineTo(px+S,py+S*.32);ctx.fill();
    ctx.fillStyle="#fde047";ctx.font=`bold ${S*.32|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("⚔",px+S/2,py+S*.68);
  }else if(t===K_CENTER){
    ctx.fillStyle="#e2e8f0";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#cbd5e1";ctx.fillRect(px+1,py+1,S-2,S*.28);
    ctx.fillStyle="#94a3b8";ctx.fillRect(px+1,py+S*.28,S-2,2);
    const pulse=.55+Math.sin(fr*.06)*.3;
    ctx.fillStyle=`rgba(239,68,68,${pulse})`;
    ctx.fillRect(px+S*.42,py+S*.4,S*.16,S*.45);ctx.fillRect(px+S*.28,py+S*.53,S*.44,S*.16);
  }else if(t===K_EXIT){
    drawTile(ctx,T_PATH,px,py,S,fr,gx,gy);
    ctx.fillStyle="rgba(253,224,71,.25)";ctx.fillRect(px+2,py+2,S-4,S-4);
    ctx.fillStyle="#fde047";ctx.font=`bold ${S*.46|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("▼",px+S/2,py+S*.55);
  }else if(t===K_PIER){
    drawCityTile(ctx,K_DECK,px,py,S,fr,gx,gy);
    ctx.fillStyle="#fde047";ctx.font=`bold ${S*.34|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("🎣",px+S/2,py+S*.5);
  }else if(t===K_SEESTERN){
    ctx.fillStyle="#4c1d95";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#6d28d9";ctx.fillRect(px+1,py+S*.32,S-2,S*.68);
    ctx.fillStyle="#a78bfa";ctx.beginPath();ctx.moveTo(px-1,py+S*.34);ctx.lineTo(px+S/2,py+1);ctx.lineTo(px+S+1,py+S*.34);ctx.fill();
    ctx.fillStyle="#fde047";ctx.fillRect(px+S*.36,py+S*.5,S*.28,S*.4);
    ctx.fillStyle="#c4b5fd";ctx.fillRect(px+S*.12,py+S*.44,S*.16,S*.16);ctx.fillRect(px+S*.72,py+S*.44,S*.16,S*.16);
  }else if(t===K_DECK){
    // Holzsteg über Wasser
    drawTile(ctx,T_WATER,px,py,S,fr,gx,gy);
    ctx.fillStyle="#8b5a2b";ctx.fillRect(px,py+2,S,S-4);
    ctx.fillStyle="#a16207";for(let i=0;i<3;i++)ctx.fillRect(px+1,py+3+i*(S*.31),S-2,S*.22);
    ctx.fillStyle="#5c3317";ctx.fillRect(px,py+2,S,1);ctx.fillRect(px,py+S-3,S,1);
  }else if(t===K_WALL){
    // Stadtmauer mit Zinnen
    ctx.fillStyle="#57534e";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#78716c";
    for(let r=0;r<3;r++)for(let c=0;c<2;c++)ctx.fillRect(px+2+c*(S*.5)+(r%2?S*.25:0),py+3+r*(S*.32),S*.42,S*.26);
    ctx.fillStyle="#44403c";ctx.fillRect(px,py,S,2);
    ctx.fillStyle="#a8a29e";for(let i=0;i<3;i++)ctx.fillRect(px+i*(S*.36)+1,py,S*.22,3);
  }else if(t===K_ROCK){
    // Fels / Berghang (Pfänder)
    ctx.fillStyle="#44403c";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#57534e";ctx.beginPath();ctx.moveTo(px,py+S);ctx.lineTo(px+S*.3,py+S*.25);ctx.lineTo(px+S*.62,py+S);ctx.fill();
    ctx.fillStyle="#78716c";ctx.beginPath();ctx.moveTo(px+S*.4,py+S);ctx.lineTo(px+S*.72,py+S*.35);ctx.lineTo(px+S,py+S);ctx.fill();
    ctx.fillStyle="#e7e5e4";ctx.beginPath();ctx.moveTo(px+S*.24,py+S*.36);ctx.lineTo(px+S*.3,py+S*.25);ctx.lineTo(px+S*.37,py+S*.37);ctx.fill();
  }else if(t===K_FLOWER){
    drawTile(ctx,T_GRASS,px,py,S,fr,gx,gy);
    ctx.fillStyle="#3f2a14";ctx.fillRect(px+2,py+2,S-4,S-4);
    const cols=["#fb7185","#fbbf24","#f472b6","#a3e635","#93c5fd"];
    for(let r=0;r<3;r++)for(let c=0;c<3;c++){
      ctx.fillStyle=cols[(gx+gy+r*3+c)%cols.length];
      ctx.beginPath();ctx.arc(px+7+c*9,py+7+r*9,2.4,0,Math.PI*2);ctx.fill();
    }
  }else if(t===K_LAND){
    // Sockel der Wahrzeichen – Detail kommt in drawCityDeco obendrauf
    ctx.fillStyle="#6b7280";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#9ca3af";ctx.fillRect(px+1,py+1,S-2,S-2);
  }else drawTile(ctx,t,px,py,S,fr,gx,gy);
}

/* ───── TILE DRAW ───── */
/* ───── AUTOTILING: weiche Übergänge zwischen Geländearten ─────
   Zeichnet nach dem Grundtile die Kanten zu andersartigen Nachbarn.
   "Rang" bestimmt, wer über wen läuft (höherer Rang überlagert). */
const TERRAIN_RANK={[T_WATER]:0,[T_SAND]:1,[T_GRASS]:2,[T_PATH]:3};
function terrainAt(map,x,y,W,H){
  if(x<0||y<0||x>=W||y>=H)return null;
  const t=map[y]?.[x];
  return TERRAIN_RANK[t]!==undefined?t:null;
}
function edgeColors(t){
  if(t===T_SAND)  return ["#d9b166","#c69a52"];
  if(t===T_GRASS) return ["#1a6b34","#2f8f4a"];
  if(t===T_PATH)  return ["#a97142","#8a5a2b"];
  return null;
}
// Zeichnet die Übergangskanten der Kachel (gx,gy) auf ihre Nachbarn
function drawAutotileEdges(ctx,map,t,px,py,S,fr,gx,gy,W,H){
  const myRank=TERRAIN_RANK[t];
  if(myRank===undefined)return;
  const N=terrainAt(map,gx,gy-1,W,H), So=terrainAt(map,gx,gy+1,W,H),
        E=terrainAt(map,gx+1,gy,W,H), Wt=terrainAt(map,gx-1,gy,W,H);
  const sides=[[N,"n"],[So,"s"],[E,"e"],[Wt,"w"]];
  // Höherrangige Nachbarn ragen in diese Kachel hinein
  for(const [nb,dir] of sides){
    if(nb===null||TERRAIN_RANK[nb]<=myRank)continue;
    const cols=edgeColors(nb);if(!cols)continue;
    const [c1,c2]=cols;
    const d=Math.max(3,Math.round(S*0.18));
    ctx.fillStyle=c1;
    if(dir==="n")ctx.fillRect(px,py,S,d);
    if(dir==="s")ctx.fillRect(px,py+S-d,S,d);
    if(dir==="e")ctx.fillRect(px+S-d,py,d,S);
    if(dir==="w")ctx.fillRect(px,py,d,S);
    // Ausgefranste Kante: einzelne Pixel in Sekundärfarbe
    ctx.fillStyle=c2;
    const n=Math.round(S/4);
    for(let i=0;i<n;i++){
      const h=((gx*73856093)^(gy*19349663)^(i*83492791)^dir.charCodeAt(0))>>>0;
      const j=(h%3);           // Tiefe der Ausfransung
      const o=i*4+(h>>3)%2;    // Position entlang der Kante
      if(o>=S)continue;
      if(dir==="n")ctx.fillRect(px+o,py+d,2,j);
      if(dir==="s")ctx.fillRect(px+o,py+S-d-j,2,j);
      if(dir==="e")ctx.fillRect(px+S-d-j,py+o,j,2);
      if(dir==="w")ctx.fillRect(px+d,py+o,j,2);
    }
  }
  // Uferschaum: Wasser, das an Land grenzt
  if(t===T_WATER){
    const foam=(dir,nb)=>{
      if(nb===null||nb===T_WATER)return;
      const wob=Math.sin(fr*.07+gx*1.7+gy*2.1)*1.6;
      ctx.fillStyle="rgba(226,244,255,.62)";
      const th=3;
      if(dir==="n")ctx.fillRect(px,py+1+wob*.4,S,th);
      if(dir==="s")ctx.fillRect(px,py+S-th-1+wob*.4,S,th);
      if(dir==="e")ctx.fillRect(px+S-th-1+wob*.4,py,th,S);
      if(dir==="w")ctx.fillRect(px+1+wob*.4,py,th,S);
      ctx.fillStyle="rgba(255,255,255,.35)";
      for(let i=0;i<4;i++){
        const h=((gx*2654435761)^(gy*40503)^(i*97))>>>0;
        const o=(h%(S-4));
        if(dir==="n")ctx.fillRect(px+o,py+4+wob*.4,2,1);
        if(dir==="s")ctx.fillRect(px+o,py+S-5+wob*.4,2,1);
        if(dir==="e")ctx.fillRect(px+S-5+wob*.4,py+o,1,2);
        if(dir==="w")ctx.fillRect(px+4+wob*.4,py+o,1,2);
      }
    };
    foam("n",N);foam("s",So);foam("e",E);foam("w",Wt);
  }
}

function drawTile(ctx,t,px,py,S,fr,gx=0,gy=0){
  const H=(a,b)=>((gx*73856093)^(gy*19349663)^(a*83492791)+b)>>>0; // stabiler Hash je Weltkachel
  if(t===T_TREE){
    // Waldboden + Baum mit Volumen
    ctx.fillStyle="#123d12";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#0d2f0d";for(let i=0;i<4;i++){const h=H(i,7);ctx.fillRect(px+(h%S),py+((h>>4)%S),2,2);}
    ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.ellipse(px+S/2,py+S*.9,S*.34,S*.1,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#5c3a1e";ctx.fillRect(px+S*.44,py+S*.66,S*.12,S*.28);
    ctx.fillStyle="#3f2812";ctx.fillRect(px+S*.44,py+S*.66,S*.05,S*.28);
    const sw=Math.sin(fr*.025+gx*1.3+gy*.7)*1.2;
    ctx.fillStyle="#0f3d1f";ctx.beginPath();ctx.arc(px+S/2+sw,py+S*.56,S*.42,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#166534";ctx.beginPath();ctx.arc(px+S*.44+sw,py+S*.5,S*.34,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#22c55e";ctx.beginPath();ctx.arc(px+S*.4+sw,py+S*.38,S*.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#4ade80";ctx.beginPath();ctx.arc(px+S*.36+sw,py+S*.3,S*.1,0,Math.PI*2);ctx.fill();
  }else if(t===T_GRASS){
    // Zweifarbiger Grasteppich mit Büscheln, Halmen und seltenen Blumen
    ctx.fillStyle="#1a6b34";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#175c2c";
    for(let r=0;r<2;r++)for(let c=0;c<2;c++)if(((gx+gy+r+c)&1)===0)ctx.fillRect(px+c*S/2,py+r*S/2,S/2,S/2);
    ctx.fillStyle="#2f8f4a";
    [[4,6],[13,17],[22,8],[18,23],[8,13]].forEach(([bx,by],i)=>{
      if((H(i,3)%5)<3){ctx.fillRect(px+bx,py+by,2,5);ctx.fillRect(px+bx-2,py+by+3,6,2);}
    });
    ctx.fillStyle="#3faa5c";for(let i=0;i<3;i++){const h=H(i,11);ctx.fillRect(px+(h%(S-3)),py+((h>>5)%(S-3)),1,3);}
    const fh=((gx*7+gy*13)>>1)%23;
    if(fh<3){const fc=["#fde047","#f9a8d4","#fca5a5"][fh%3];const fx=px+6+((gx*3+gy*5)%14),fy=py+8+((gx*5+gy)%12);
      ctx.fillStyle="#166534";ctx.fillRect(fx,fy,1,4);
      ctx.fillStyle=fc;ctx.beginPath();ctx.arc(fx,fy,1.9,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(fx+3,fy+2,1.7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#fff7ae";ctx.fillRect(fx-0.5,fy-0.5,1,1);}
  }else if(t===T_PATH){
    // Kopfsteinpflaster
    ctx.fillStyle="#8a5a2b";ctx.fillRect(px,py,S,S);
    const stones=[[2,2,12,9],[16,3,13,8],[3,13,10,8],[15,13,14,9],[4,23,11,7],[17,24,12,6]];
    stones.forEach(([sx,sy,sw2,sh],i)=>{
      const v=H(i,5)%3;
      ctx.fillStyle=["#a97142","#b58253","#9c6636"][v];
      ctx.fillRect(px+sx,py+sy,sw2,sh);
      ctx.fillStyle="rgba(255,235,200,.18)";ctx.fillRect(px+sx,py+sy,sw2,1);
      ctx.fillStyle="rgba(60,30,10,.28)";ctx.fillRect(px+sx,py+sy+sh-1,sw2,1);
    });
  }else if(t===T_WATER){
    // Tiefenverlauf + wandernde Lichtreflexe
    const g=ctx.createLinearGradient(px,py,px,py+S);
    g.addColorStop(0,"#0b4f7e");g.addColorStop(1,"#083a5f");
    ctx.fillStyle=g;ctx.fillRect(px,py,S,S);
    const t1=fr*.03;
    ctx.strokeStyle="rgba(147,197,253,.20)";ctx.lineWidth=1.6;
    [6,15,24].forEach((oy,i)=>{
      ctx.beginPath();
      for(let sx2=0;sx2<=S;sx2+=4){
        const yy=py+oy+Math.sin((px+sx2)*.09+t1+i)*1.8;
        sx2===0?ctx.moveTo(px,yy):ctx.lineTo(px+sx2,yy);
      }
      ctx.stroke();
    });
    const sparkle=(Math.sin(t1*2+gx*1.7+gy*2.3)+1)/2;
    if(sparkle>.86){ctx.fillStyle="rgba(219,240,255,.75)";ctx.fillRect(px+((gx*5+gy*3)%(S-6))+3,py+((gx*7+gy)%(S-6))+3,2,2);}
  }else if(t===T_SAND){
    // Kiesiger Uferstreifen
    ctx.fillStyle="#d9b166";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#c69a52";for(let r=0;r<2;r++)for(let c=0;c<2;c++)if(((gx+gy+r*2+c)&1)===0)ctx.fillRect(px+c*S/2,py+r*S/2,S/2,S/2);
    for(let i=0;i<7;i++){const h=H(i,17);ctx.fillStyle=["#a97a3a","#e6c98d","#b98c46"][h%3];
      ctx.fillRect(px+(h%(S-3)),py+((h>>6)%(S-3)),2,2);}
  }else if(t===T_HOUSE){
    // Fachwerk-Altstadthaus
    ctx.fillStyle="#e8dcc8";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#8a2b2b";ctx.beginPath();ctx.moveTo(px-1,py+S*.42);ctx.lineTo(px+S/2,py+2);ctx.lineTo(px+S+1,py+S*.42);ctx.fill();
    ctx.fillStyle="#a13333";for(let i=0;i<3;i++)ctx.fillRect(px+2,py+S*.14+i*S*.1,S-4,2);
    ctx.fillStyle="#f5ecd9";ctx.fillRect(px+1,py+S*.42,S-2,S*.58);
    ctx.fillStyle="#6b4423";
    ctx.fillRect(px+1,py+S*.42,S-2,2);ctx.fillRect(px+1,py+S*.7,S-2,2);
    ctx.fillRect(px+S*.46,py+S*.44,2,S*.26);
    ctx.fillRect(px+2,py+S*.44,2,S*.54);ctx.fillRect(px+S-4,py+S*.44,2,S*.54);
    ctx.fillStyle="#7dd3fc";ctx.fillRect(px+S*.14,py+S*.5,S*.22,S*.16);ctx.fillRect(px+S*.62,py+S*.5,S*.22,S*.16);
    ctx.fillStyle="#5c3317";ctx.fillRect(px+S*.38,py+S*.74,S*.24,S*.26);
    ctx.fillStyle="#fbbf24";ctx.fillRect(px+S*.56,py+S*.85,2,2);
  }else if(t===T_OWPIER){
    // Wasser drunter
    drawTile(ctx,T_WATER,px,py,S,fr,gx,gy);
    // Holzplanken
    ctx.fillStyle="#78350f";ctx.fillRect(px+S*.18,py,S*.64,S);
    ctx.fillStyle="#92400e";for(let i=0;i<4;i++)ctx.fillRect(px+S*.18,py+i*S*.26+2,S*.64,S*.16);
    ctx.fillStyle="#5c2c0a";ctx.fillRect(px+S*.18,py,2,S);ctx.fillRect(px+S*.8,py,2,S);
  }else if(t===T_WALOX){
    drawTile(ctx,T_WATER,px,py,S,fr,gx,gy);
    ctx.fillStyle="#78350f";ctx.fillRect(px+S*.18,py,S*.64,S*.7);
    ctx.fillStyle="#92400e";for(let i=0;i<2;i++)ctx.fillRect(px+S*.18,py+i*S*.26+2,S*.64,S*.16);
    ctx.fillStyle="#5c2c0a";ctx.fillRect(px+S*.18,py,2,S*.7);ctx.fillRect(px+S*.8,py,2,S*.7);
  }else{
    const cols={5:"#dc2626",6:"#2563eb",7:"#7c3aed",8:"#059669",9:"#d97706",13:"#0d9488"};
    ctx.fillStyle="#a16207";ctx.fillRect(px,py,S,S);
    ctx.fillStyle=cols[t]||"#fff";ctx.fillRect(px+3,py+3,S-6,S-6);
    ctx.fillStyle="#0f172a";ctx.fillRect(px+S*.28|0,py+S*.22|0,S*.44|0,S*.78|0);
    ctx.fillStyle="white";ctx.font=`bold ${S*.38|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("▲",px+S/2,py+S*.35);
  }
}
/* ───── PLAYER DRAW (gender aware) ───── */
function drawPlayer(ctx,px,py,facing,moving,fr,gender="m"){
  const f=gender==="f";
  const leg=moving?(Math.floor(fr/8)%2?3:-3):0;
  const jkt=f?"#0d9488":"#1d4ed8";
  ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.ellipse(px,py+9,9,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#1e293b";ctx.fillRect(px-6,py+3,5,8+leg);ctx.fillRect(px+1,py+3,5,8-leg);
  ctx.fillStyle="#292524";ctx.fillRect(px-7,py+11+leg,6,4);ctx.fillRect(px+1,py+11-leg,6,4);
  ctx.fillStyle=jkt;ctx.fillRect(px-8,py-9,16,13);
  if(facing==="left"){ctx.fillStyle=jkt;ctx.fillRect(px-12,py-7,5,9);}
  else if(facing==="right"){ctx.fillStyle=jkt;ctx.fillRect(px+7,py-7,5,9);}
  else{ctx.fillStyle=jkt;ctx.fillRect(px-12,py-6,5,8);ctx.fillRect(px+7,py-6,5,8);}
  ctx.fillStyle="#fbbf24";ctx.fillRect(px-2,py-11,4,3);
  ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(px,py-15,7.5,0,Math.PI*2);ctx.fill();
  if(f){
    ctx.fillStyle="#1c1917";
    ctx.fillRect(px-8,py-14,3,8);ctx.fillRect(px+5,py-14,3,8);
    ctx.fillRect(px-9,py-12,2,10);ctx.fillRect(px+7,py-12,2,10);
  }
  ctx.fillStyle="#92400e";ctx.fillRect(px-9,py-21,18,5);ctx.fillRect(px-6,py-27,12,7);
  ctx.fillStyle=f?"#f472b6":"#78350f";ctx.fillRect(px-6,py-22,12,2);
  ctx.fillStyle="#0f172a";
  if(facing==="left"){ctx.fillRect(px-4,py-16,2,2);}
  else if(facing==="right"){ctx.fillRect(px+2,py-16,2,2);}
  else if(facing==="up"){ctx.fillRect(px-3,py-18,2,2);ctx.fillRect(px+1,py-18,2,2);}
  else{ctx.fillRect(px-3,py-14,2,2);ctx.fillRect(px+1,py-14,2,2);}
  ctx.strokeStyle="#78350f";ctx.lineWidth=2;ctx.lineCap="round";
  ctx.beginPath();
  if(facing==="right"||facing==="down"){ctx.moveTo(px+8,py-6);ctx.lineTo(px+23,py-20);}
  else{ctx.moveTo(px-8,py-6);ctx.lineTo(px-23,py-20);}
  ctx.stroke();
  ctx.strokeStyle="#94a3b8";ctx.lineWidth=1;
  ctx.beginPath();
  if(facing==="right"||facing==="down"){ctx.moveTo(px+23,py-20);ctx.lineTo(px+27,py-10);}
  else{ctx.moveTo(px-23,py-20);ctx.lineTo(px-27,py-10);}
  ctx.stroke();
}

/* ───── WALOX surfacing in the lake (canvas) ───── */
function drawWaloxOnMap(ctx,cx,cy,fr){
  const bob=Math.sin(fr*.04)*4;
  cy+=bob;
  // ripple rings
  for(let i=0;i<3;i++){const r=18+i*12+((fr*.6)%12);ctx.strokeStyle=`rgba(125,211,252,${.28-i*.08})`;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx,cy+10,r,r*.4,0,0,Math.PI*2);ctx.stroke();}
  // spout
  ctx.strokeStyle="rgba(165,243,252,.85)";ctx.lineWidth=3;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(cx-14,cy-10);ctx.quadraticCurveTo(cx-18,cy-26-Math.abs(bob),cx-12,cy-34-Math.abs(bob));ctx.stroke();
  // body (surfaced back)
  const grad=ctx.createLinearGradient(cx,cy-14,cx,cy+14);grad.addColorStop(0,"#155e75");grad.addColorStop(1,"#0e7490");

/* ───── Strudel (nachdem Walox bezwungen) ───── */
function drawStrudel(ctx,cx,cy,fr){
  for(let i=0;i<4;i++){
    const a=fr*.06+i*Math.PI/2;const rr=8+i*7;
    ctx.strokeStyle=`rgba(125,211,252,${.6-i*.12})`;ctx.lineWidth=3-i*.4;
    ctx.beginPath();
    for(let t=0;t<Math.PI*1.6;t+=.2){const r=rr+t*3;ctx.lineTo(cx+Math.cos(t+a)*r,cy+Math.sin(t+a)*r*.6);}
    ctx.stroke();
  }
  ctx.fillStyle="rgba(2,12,24,.7)";ctx.beginPath();ctx.ellipse(cx,cy,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(125,211,252,.95)";ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.textBaseline="bottom";
  ctx.fillText("STRUDEL",cx,cy-26);
}

/* ═══════════════════════════════════════════════════ OVERWORLD ═══ */
function OverworldScreen({player,onEnterTown,onWild,onMenu,canEnter,onWalox,onStrudel}){
  const canvasRef=useRef(null);
  const posRef=useRef({...OW.pos});
  const facingRef=useRef(OW.facing);
  const keysRef=useRef({});
  const stepRef=useRef(0);
  const lastTRef=useRef({x:Math.floor(OW.pos.x/TS),y:Math.floor(OW.pos.y/TS)});
  const rafRef=useRef(null);
  const [,redraw]=useState(0);
  const [msg,setMsg]=useState("");
  const msgTRef=useRef(null);
  const genderRef=useRef(player.gender);
  const liveRef=useRef(player);liveRef.current=player;

  function showMsg(txt){setMsg(txt);clearTimeout(msgTRef.current);msgTRef.current=setTimeout(()=>setMsg(""),2200);}
  useEffect(()=>{
    const dn=e=>{keysRef.current[e.key]=true;["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)&&e.preventDefault();};
    const up=e=>{keysRef.current[e.key]=false;};
    window.addEventListener("keydown",dn);window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up);};
  },[]);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;
    const ctx=canvas.getContext("2d");
    ctx.imageSmoothingEnabled=false;
    let frame=0;const SPEED=2.4;
    const loop=()=>{
      frame++;
      const k=keysRef.current;
      let dx=0,dy=0;
      if(k["ArrowLeft"]||k["a"]||k["A"]){dx=-SPEED;facingRef.current="left";}
      if(k["ArrowRight"]||k["d"]||k["D"]){dx=SPEED;facingRef.current="right";}
      if(k["ArrowUp"]||k["w"]||k["W"]){dy=-SPEED;facingRef.current="up";}
      if(k["ArrowDown"]||k["s"]||k["S"]){dy=SPEED;facingRef.current="down";}
      if(dx&&dy){dx*=.707;dy*=.707;}
      const moving=!!(dx||dy);
      if(moving){
        const nx=posRef.current.x+dx,ny=posRef.current.y+dy;
        const corners=[[nx-9,ny-5],[nx+9,ny-5],[nx-9,ny+9],[nx+9,ny+9]];
        const ok=corners.every(([cx,cy])=>{const tx=Math.floor(cx/TS),ty=Math.floor(cy/TS);const t2=THE_MAP[ty]?.[tx];return t2!==undefined&&t2!==T_TREE&&t2!==T_WATER&&t2!==T_HOUSE;});
        if(ok){
          posRef.current={x:nx,y:ny};OW.pos={...posRef.current};OW.facing=facingRef.current;
          const tx=Math.floor(nx/TS),ty=Math.floor(ny/TS);
          const last=lastTRef.current;
          if(tx!==last.x||ty!==last.y){
            lastTRef.current={x:tx,y:ty};
            const tile=THE_MAP[ty]?.[tx];
            if(tile===T_GRASS){stepRef.current++;if(stepRef.current>6&&Math.random()<0.22){stepRef.current=0;let pool;if(tx<22){pool=ty<18?["karpfi","forellius"]:["karpfi","barschi"];}else if(tx<36){pool=ty<18?["hechtus","forellius"]:["barschi","karpfi"];}else if(tx<48){pool=ty<18?["hechtus","zanderan"]:["hechtus","forellius"];}else{pool=ty<20?["zanderan","hechtus"]:["welsio","zanderan"];}AUDIO.sfx("encounter");cancelAnimationFrame(rafRef.current);onWild(pool[Math.floor(Math.random()*pool.length)]);return;}}else{stepRef.current=0;}
            const cid=ENTRANCE[tile];if(cid){const city=CITIES.find(c=>c.id===cid);if(city){const reason=canEnter?canEnter(city):null;if(reason){AUDIO.sfx("deny");lastTRef.current={x:tx,y:ty};showMsg(reason,2600);}else{cancelAnimationFrame(rafRef.current);showMsg(`→ ${city.name}`);setTimeout(()=>onEnterTown(city),350);return;}}}
            if(tile===T_WALOX){
              if(player.waloxDefeated){cancelAnimationFrame(rafRef.current);setTimeout(()=>onStrudel(),250);return;}
              else if(!player.waloxUnlocked){showMsg("Die Mitte des Sees liegt still da...");}
              else if(liveRef.current.team.every(m=>(m.level||1)<MAXLV)){showMsg("Etwas Gewaltiges regt sich in der Tiefe! Komm mit einem Aquariummon auf Lv3 wieder.",3000);}
              else if(liveRef.current.team.length>=3&&(liveRef.current.box?.length||0)>=BOX_MAX){showMsg("🐳 Box voll! Walox braucht Platz – lass erst ein Aquariummon frei.",3000);}
              else{cancelAnimationFrame(rafRef.current);AUDIO.sfx("legend");showMsg("⭐ WALOX erhebt sich!");setTimeout(()=>onWalox(),550);return;}
            }
          }
        }
      }
      const W=canvas.width,H=canvas.height;
      ctx.fillStyle="#020c18";ctx.fillRect(0,0,W,H);
      const camX=Math.max(0,Math.min(posRef.current.x-W/2,(MAP_W-1)*TS-W));
      const camY=Math.max(0,Math.min(posRef.current.y-H/2,(MAP_H-1)*TS-H));
      const sx=Math.floor(camX/TS),sy=Math.floor(camY/TS),ex=Math.ceil((camX+W)/TS)+1,ey=Math.ceil((camY+H)/TS)+1;
      for(let ty2=sy;ty2<ey;ty2++)for(let tx2=sx;tx2<ex;tx2++){
        if(ty2<0||ty2>=MAP_H||tx2<0||tx2>=MAP_W)continue;
        const tt=THE_MAP[ty2]?.[tx2]??0, ppx=tx2*TS-camX, ppy=ty2*TS-camY;
        drawTile(ctx,tt,ppx,ppy,TS,frame,tx2,ty2);
        drawAutotileEdges(ctx,THE_MAP,tt,ppx,ppy,TS,frame,tx2,ty2,MAP_W,MAP_H);
      }
      CITIES.forEach(c=>{
        if(c.id==="ravensburg"&&!player.waloxDefeated)return;
        const beaten=player.beaten?.includes(c.id);
        const lx=c.x*TS-camX+TS/2,ly=c.y*TS-camY-8;
        if(lx<-60||lx>W+60||ly<-30||ly>H+30)return;
        const nm=c.name+(beaten?" ✓":"");
        ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.textBaseline="bottom";
        const tw=ctx.measureText(nm).width;
        ctx.fillStyle="rgba(2,12,24,.8)";ctx.fillRect(lx-tw/2-5,ly-12,tw+10,14);
        ctx.strokeStyle=beaten?"rgba(0,230,118,.6)":"rgba(251,191,36,.6)";ctx.lineWidth=1;
        ctx.strokeRect(lx-tw/2-5,ly-12,tw+10,14);
        ctx.fillStyle=beaten?"#4ade80":"#fbbf24";ctx.fillText(nm,lx,ly);
      });
      if(player.waloxDefeated){const sx2=WALOX_TILE.x*TS-camX+TS/2,sy2=WALOX_TILE.y*TS-camY+TS/2;if(sx2>-60&&sx2<W+60&&sy2>-60&&sy2<H+60)drawStrudel(ctx,sx2,sy2,frame);}
      else if(player.waloxUnlocked){const wsx=WALOX_TILE.x*TS-camX+TS/2,wsy=(WALOX_TILE.y-2)*TS-camY+TS/2;if(wsx>-60&&wsx<W+60&&wsy>-60&&wsy<H+60)drawWaloxOnMap(ctx,wsx,wsy,frame);}
      drawPlayer(ctx,posRef.current.x-camX,posRef.current.y-camY,facingRef.current,moving,frame,genderRef.current);
      // Minimap
      const mm=48,mms=mm/Math.max(MAP_W,MAP_H),mmx=W-mm-8,mmy=8;
      ctx.fillStyle="rgba(2,12,24,.75)";ctx.fillRect(mmx-2,mmy-2,mm+4,mm+4);
      ctx.strokeStyle="#1e5a8a";ctx.lineWidth=1;ctx.strokeRect(mmx-2,mmy-2,mm+4,mm+4);
      for(let ty2=0;ty2<MAP_H;ty2++)for(let tx2=0;tx2<MAP_W;tx2++){const t2=THE_MAP[ty2][tx2];ctx.fillStyle=t2===T_WATER?"#0e4a7a":t2===T_TREE?"#0d2008":(t2>=5&&t2<=9)||t2===T_RAVENS?"#fbbf24":t2===T_HOUSE?"#374151":t2===T_PATH?"#92400e":t2===T_SAND?"#ca8a04":t2===T_OWPIER?"#78350f":t2===T_WALOX?(player.waloxDefeated?"#7dd3fc":"#22d3ee"):"#166534";ctx.fillRect(mmx+tx2*mms,mmy+ty2*mms,Math.ceil(mms),Math.ceil(mms));}
      ctx.fillStyle="#f87171";ctx.beginPath();ctx.arc(mmx+Math.floor(posRef.current.x/TS)*mms+mms/2,mmy+Math.floor(posRef.current.y/TS)*mms+mms/2,2,0,Math.PI*2);ctx.fill();
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(rafRef.current);
  },[]);
  const K=k=>v=>{keysRef.current[k]=v;};
  const dBtn=(k,lbl)=>(<button onTouchStart={e=>{e.preventDefault();K(k)(true);}} onTouchEnd={e=>{e.preventDefault();K(k)(false);}} onMouseDown={()=>K(k)(true)} onMouseUp={()=>K(k)(false)} onMouseLeave={()=>K(k)(false)} style={{width:46,height:46,background:"rgba(2,12,24,.82)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:20,borderRadius:8,cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none",WebkitTapHighlightColor:"transparent",touchAction:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>{lbl}</button>);
  return(
    <div style={{width:"100%",height:"100%",position:"relative",overflow:"hidden",background:"#020c18"}}>

      <button onClick={onMenu} style={{position:"absolute",top:8,right:62,background:"rgba(2,12,24,.85)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:"clamp(5px,1vw,8px)",fontFamily:"inherit",padding:"5px 8px",cursor:"pointer",borderRadius:4}}>📋 MENÜ</button>
      {msg&&<div style={{position:"absolute",top:"40%",left:"50%",transform:"translateX(-50%)",background:"rgba(2,12,24,.92)",border:"1px solid #1e5a8a",padding:"8px 16px",color:"#e0f2fe",fontSize:"clamp(6px,1.2vw,10px)",fontFamily:"'Press Start 2P',monospace",whiteSpace:"nowrap",borderRadius:4}}>{msg}</div>}
      <div style={{position:"absolute",bottom:"calc(env(safe-area-inset-bottom, 0px) + 18px)",left:16,display:"grid",gridTemplateColumns:"46px 46px 46px",gridTemplateRows:"46px 46px 46px",gap:3,touchAction:"none",WebkitUserSelect:"none",userSelect:"none",WebkitTouchCallout:"none"}}>
        <div/>{dBtn("ArrowUp","↑")}<div/>

/* ═══════════════════════════════════════════════════ CITY INTERIOR ═══ */
function CityInterior({city,player,beaten,onArena,onCenter,onFish,onExit,onMenu,onSeestern}){
  const canvasRef=useRef(null);
  const CMAP=cityMap(city.id);
  const start=cityEntryPos(city.id);
  const posRef=useRef({...start.pos});
  const facingRef=useRef(start.facing);
  const keysRef=useRef({});
  const lastTRef=useRef({x:Math.floor(start.pos.x/KTS),y:Math.floor(start.pos.y/KTS)});
  const rafRef=useRef(null);
  const [msg,setMsg]=useState("");
  const msgTRef=useRef(null);
  const genderRef=useRef(player.gender);
  const liveRef=useRef(player);liveRef.current=player;
  const lockRef=useRef(false);

  function showMsg(txt,ms=2200){setMsg(txt);clearTimeout(msgTRef.current);msgTRef.current=setTimeout(()=>setMsg(""),ms);}

  useEffect(()=>{
    const dn=e=>{keysRef.current[e.key]=true;["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)&&e.preventDefault();};
    const up=e=>{keysRef.current[e.key]=false;};
    window.addEventListener("keydown",dn);window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up);};
  },[]);

  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;
    const ctx=canvas.getContext("2d");
    ctx.imageSmoothingEnabled=false;
    let frame=0;const SPEED=2.2;
    const loop=()=>{
      frame++;
      const k=keysRef.current;
      let dx=0,dy=0;
      if(!lockRef.current){
        if(k["ArrowLeft"]||k["a"]||k["A"]){dx=-SPEED;facingRef.current="left";}
        if(k["ArrowRight"]||k["d"]||k["D"]){dx=SPEED;facingRef.current="right";}
        if(k["ArrowUp"]||k["w"]||k["W"]){dy=-SPEED;facingRef.current="up";}
        if(k["ArrowDown"]||k["s"]||k["S"]){dy=SPEED;facingRef.current="down";}
        if(dx&&dy){dx*=.707;dy*=.707;}
      }
      const moving=!!(dx||dy);
      if(moving){
        const nx=posRef.current.x+dx,ny=posRef.current.y+dy;
        const corners=[[nx-9,ny-5],[nx+9,ny-5],[nx-9,ny+9],[nx+9,ny+9]];
        const ok=corners.every(([cx,cy])=>{const tx=Math.floor(cx/KTS),ty=Math.floor(cy/KTS);const t2=CMAP[ty]?.[tx];return t2!==undefined&&!SOLID.has(t2);});
        if(ok){
          posRef.current={x:nx,y:ny};
          const tx=Math.floor(nx/KTS),ty=Math.floor(ny/KTS);
          const last=lastTRef.current;
          if(tx!==last.x||ty!==last.y){
            lastTRef.current={x:tx,y:ty};
            const tile=CMAP[ty]?.[tx];
            if(tile===K_ARENA&&!lockRef.current){
              lockRef.current=true;
              if(beaten){showMsg("🏟 Arena bereits gemeistert!");setTimeout(()=>lockRef.current=false,900);}
              else{cancelAnimationFrame(rafRef.current);onArena();return;}
            }else if(tile===K_CENTER&&!lockRef.current){
              lockRef.current=true;showMsg("✚ Deine Aquariummon sind vollständig erholt!",2400);onCenter();
              setTimeout(()=>lockRef.current=false,1200);
            }else if(tile===K_PIER&&!lockRef.current){
              if(liveRef.current.team.length>=3&&(liveRef.current.box?.length||0)>=BOX_MAX){showMsg("🐟 Box voll! Lass erst ein Aquariummon frei (Menü → Box).",3000);}
              else{lockRef.current=true;cancelAnimationFrame(rafRef.current);onFish();return;}
            }else if(tile===K_EXIT&&!lockRef.current){
              lockRef.current=true;cancelAnimationFrame(rafRef.current);showMsg(`→ Verlasse ${city.name}...`);setTimeout(()=>onExit(),350);return;
            }else if(tile===K_SEESTERN&&!lockRef.current){
              lockRef.current=true;cancelAnimationFrame(rafRef.current);onSeestern&&onSeestern();return;
            }
          }
        }
      }
      const W=canvas.width,H=canvas.height;
      ctx.fillStyle="#020c18";ctx.fillRect(0,0,W,H);
      const worldW=KW*KTS,worldH=KH*KTS;
      const camX=Math.max(0,Math.min(posRef.current.x-W/2,Math.max(0,worldW-W)));
      const camY=Math.max(0,Math.min(posRef.current.y-H/2,Math.max(0,worldH-H)));
      const sx=Math.floor(camX/KTS),sy=Math.floor(camY/KTS),ex=Math.ceil((camX+W)/KTS)+1,ey=Math.ceil((camY+H)/KTS)+1;
      for(let ty2=sy;ty2<ey;ty2++)for(let tx2=sx;tx2<ex;tx2++){
        if(ty2<0||ty2>=KH||tx2<0||tx2>=KW)continue;
        const tt=CMAP[ty2]?.[tx2]??1, ppx=tx2*KTS-camX, ppy=ty2*KTS-camY;
        drawCityTile(ctx,tt,ppx,ppy,KTS,frame,tx2,ty2);
        drawAutotileEdges(ctx,CMAP,tt,ppx,ppy,KTS,frame,tx2,ty2,KW,KH);
      }
      drawCityDeco(ctx,city.id,camX,camY,frame);
      // Schilder über Arena / Center / Seestern (Positionen aus der Karte)
      ctx.font="bold 8px monospace";ctx.textAlign="center";ctx.textBaseline="bottom";
      for(let ty2=0;ty2<KH;ty2++)for(let tx2=0;tx2<KW;tx2++){
        const t2=CMAP[ty2][tx2];if(t2!==K_ARENA&&t2!==K_CENTER&&t2!==K_SEESTERN)continue;
        const lx=tx2*KTS-camX+KTS/2,ly=ty2*KTS-camY-3;
        const txt=t2===K_ARENA?(beaten?"ARENA ✓":"ARENA"):t2===K_CENTER?"CENTER":"Prof. Seestern";
        const col=t2===K_ARENA?(beaten?"#4ade80":"#f87171"):t2===K_CENTER?"#7dd3fc":"#c4b5fd";
        const tw=ctx.measureText(txt).width;
        ctx.fillStyle="rgba(2,12,24,.72)";ctx.fillRect(lx-tw/2-3,ly-10,tw+6,11);
        ctx.fillStyle=col;ctx.fillText(txt,lx,ly);
      }
      drawPlayer(ctx,posRef.current.x-camX,posRef.current.y-camY,facingRef.current,moving,frame,genderRef.current);
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(rafRef.current);
  },[beaten]);

  const K=k=>v=>{keysRef.current[k]=v;};
  const dBtn=(k,lbl)=>(<button onTouchStart={e=>{e.preventDefault();K(k)(true);}} onTouchEnd={e=>{e.preventDefault();K(k)(false);}} onMouseDown={()=>K(k)(true)} onMouseUp={()=>K(k)(false)} onMouseLeave={()=>K(k)(false)} style={{width:46,height:46,background:"rgba(2,12,24,.82)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:20,borderRadius:8,cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none",WebkitTapHighlightColor:"transparent",touchAction:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>{lbl}</button>);
  return(
    <div style={{width:"100%",height:"100%",position:"relative",overflow:"hidden",background:"#020c18"}}>
      <canvas ref={canvasRef} style={{display:"block",width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",top:8,left:8,background:"rgba(2,12,24,.85)",border:"1px solid #0e2a4a",padding:"5px 8px",borderRadius:4,display:"flex",gap:4,alignItems:"center"}}>
        <span style={{color:"#fbbf24",fontSize:"clamp(6px,1vw,9px)",marginRight:4}}>📍 {city.name.toUpperCase()}{city.finale?" ★":""}</span>
        {player.team.map((m,i)=>(<div key={i} style={{filter:`drop-shadow(0 0 3px ${m.color})`}}><MonSprite monKey={m.key} size={20}/></div>))}
      </div>
      <div style={{position:"absolute",top:"calc(env(safe-area-inset-top, 0px) + 42px)",left:"50%",transform:"translateX(-50%)",textAlign:"center",pointerEvents:"none"}}>
        <div style={{color:"#fde047",fontSize:"clamp(9px,2vw,15px)",letterSpacing:"3px",textShadow:"0 2px 0 #1c1917, 0 0 14px #ca8a04"}}>{city.name.toUpperCase()}</div>
      </div>
      <button onClick={onMenu} style={{position:"absolute",top:8,right:8,background:"rgba(2,12,24,.85)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:"clamp(5px,1vw,8px)",fontFamily:"inherit",padding:"5px 8px",cursor:"pointer",borderRadius:4}}>📋 MENÜ</button>
      {msg&&<div style={{position:"absolute",top:"38%",left:"50%",transform:"translateX(-50%)",background:"rgba(2,12,24,.92)",border:"1px solid #1e5a8a",padding:"8px 16px",color:"#e0f2fe",fontSize:"clamp(6px,1.2vw,10px)",fontFamily:"'Press Start 2P',monospace",whiteSpace:"nowrap",borderRadius:4,textAlign:"center"}}>{msg}</div>}
      <div style={{position:"absolute",bottom:"calc(env(safe-area-inset-bottom, 0px) + 18px)",left:16,display:"grid",gridTemplateColumns:"46px 46px 46px",gridTemplateRows:"46px 46px 46px",gap:3,touchAction:"none",WebkitUserSelect:"none",userSelect:"none",WebkitTouchCallout:"none"}}>
        <div/>{dBtn("ArrowUp","↑")}<div/>
        {dBtn("ArrowLeft","←")}<div/>{dBtn("ArrowRight","→")}
        <div/>{dBtn("ArrowDown","↓")}<div/>
      </div>
      <div style={{position:"absolute",bottom:8,right:8,color:"#1e3a5a",fontSize:"clamp(4px,.7vw,6px)",textAlign:"right",lineHeight:1.8}}>⚔ Arena · ✚ Center<br/>🎣 Steg = Angeln<br/>▼ Süden = Ausgang</div>
    </div>
  );
}

function FishingScreen({city,baitBonus=0,onCaught,onBack}){

  const rafRef=useRef(null);const posRef=useRef(50);const dirRef=useRef(1);const spdRef=useRef(1.4);const zoneE=Math.min(92,zoneS+zoneW);

  return(
    <div style={{width:"100%",height:"100%",background:"linear-gradient(180deg,#020c18,#041a2e 60%,#031220)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",gap:"14px"}}>

      <div style={{color:"#7dd3fc",fontSize:"clamp(6px,1.2vw,10px)",textAlign:"center",minHeight:"22px"}}>{msg}</div>
      {(phase==="reeling"||phase==="casting")&&<div onClick={phase==="reeling"?pull:undefined} style={{width:"min(92%,380px)",cursor:phase==="reeling"?"pointer":"default"}}>
        <div style={{width:"100%",height:30,background:"#020c18",border:"1px solid #0e4a7a",borderRadius:4,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,bottom:0,left:`${zoneS}%`,width:`${zoneE-zoneS}%`,background:"rgba(0,230,118,.22)",borderLeft:"2px solid #00e676",borderRight:"2px solid #00e676"}}/>
          <div style={{position:"absolute",top:3,bottom:3,width:6,marginLeft:-3,left:`${pos}%`,background:"#fbbf24",borderRadius:2,boxShadow:"0 0 8px #f59e0b"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3,color:"#334155",fontSize:"clamp(4px,.7vw,7px)"}}><span>Treffer:{hits}/2</span><span>Versuche:{misses}/3</span></div>
      </div>}
      {phase==="idle"&&<button onClick={cast} style={{...G("#041a0c","#4ade80",{padding:"12px 24px",fontSize:"clamp(8px,1.5vw,11px)"})}}>🎣 Angel auswerfen</button>}
      {phase==="reeling"&&<button onClick={pull} style={{...G("#041a10","#00e676",{padding:"12px 24px",fontSize:"clamp(8px,1.5vw,11px)",boxShadow:"0 0 12px #00e67640"})}}>⚡ JETZT ZIEHEN!</button>}
      {phase==="result"&&caught&&<div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><div style={{filter:`drop-shadow(0 0 20px ${MONS[caught].color})`,animation:"monIdle 1.5s ease-in-out infinite alternate"}}><MonSprite monKey={caught} size={110}/></div><div style={{color:"#4ade80",fontSize:"clamp(8px,1.5vw,12px)"}}>{MONS[caught].name} gefangen!</div><button onClick={()=>onCaught(caught)} style={{...G("#041a0c","#4ade80"),marginTop:6}}>→ Zum Team</button></div>}
      {phase==="result"&&!caught&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}><div style={{fontSize:"3rem"}}>🌊</div><button onClick={()=>setPhase("idle")} style={G("#041624","#38bdf8")}>↺ Nochmal</button></div>}

/* Level & XP: max Level 3, +25% Werte pro Level */
const MAXLV=3;
const BOX_MAX=10; // max. Aquariummon in der Box
const LV_XP=[0,180,520]; // benötigtes Gesamt-XP für Level 1/2/3
const scaleStat=(base,level)=>Math.round(base*(1+(level-1)*0.25));
const lvlFromXp=xp=>{let l=1;for(let i=1;i<LV_XP.length;i++)if(xp>=LV_XP[i])l=i+1;return Math.min(MAXLV,l);};
const xpToNext=mon=>{const l=mon.level||1;return l>=MAXLV?null:LV_XP[l];}; // Gesamt-XP nötig fürs nächste Level
const mkMon=(k,level=1,xp=0)=>{
  const b=MONS[k];
  return {...b,key:k,level,xp,maxHp:scaleStat(b.maxHp,level),atk:scaleStat(b.atk,level),def:scaleStat(b.def,level),spd:scaleStat(b.spd||10,level),hp:scaleStat(b.maxHp,level),atkMod:0,defMod:0};
};
// XP gutschreiben → ggf. Level-Up (Werte neu skalieren, HP um Zuwachs erhöhen)
const grantXp=(mon,amount)=>{
  const b=MONS[mon.key];if(!b)return mon;
  let xp=(mon.xp||0)+amount;let level=mon.level||1;let leveled=false;
  while(level<MAXLV&&xp>=LV_XP[level]){level++;leveled=true;}
  const maxHp=scaleStat(b.maxHp,level);
  const dHp=maxHp-(mon.maxHp||scaleStat(b.maxHp,mon.level||1));
  return {...mon,xp,level,maxHp,atk:scaleStat(b.atk,level),def:scaleStat(b.def,level),spd:scaleStat(b.spd||10,level),hp:Math.min(maxHp,(mon.hp||maxHp)+(leveled?dHp:0)),_leveled:leveled};
};
const calcDmg=(a,d,mv)=>{const p=MOVES[mv]?.p||0;if(!p)return 0;const atk=a.atk*(1+(a.atkMod||0)*.3);const def=d.def*(1+(d.defMod||0)*.3);return Math.max(1,Math.floor(atk/def*p*(.85+Math.random()*.15)));};
const hpCol=p=>p>60?"#00e676":p>30?"#ffb300":"#ff1744";

/* ═══════════════════════════════════════════════════ KAMPF-KULISSE ═══ */
/* Ortsabhängiger, animierter Hintergrund hinter dem Kampf-UI. */
/* ═══════════════════════════════════════════════════ BILDSCHIRM-ÜBERGANG ═══ */
function ScreenTransition({trans,onCovered,onDone}){
  const {kind,phase}=trans;
  useEffect(()=>{
    // "in" = zudecken, danach Bildschirm wechseln; "out" = wieder aufdecken
    const dur=kind==="battle"?(phase==="in"?620:380):(phase==="in"?260:300);
    const id=setTimeout(()=>{phase==="in"?onCovered():onDone();},dur);
    return()=>clearTimeout(id);
  },[kind,phase]);

  if(kind==="battle"){
    // Kampfstart: Blitze + zulaufende Balken
    return(
      <div style={{position:"fixed",inset:0,zIndex:900,pointerEvents:"none",overflow:"hidden"}}>
        <style>{`
          @keyframes bFlash{0%,100%{opacity:0}20%{opacity:.85}40%{opacity:.15}60%{opacity:.7}80%{opacity:.1}}
          @keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}
          @keyframes barOut{from{transform:scaleX(1)}to{transform:scaleX(0)}}
        `}</style>
        {phase==="in"&&<div style={{position:"absolute",inset:0,background:"#e0f2fe",animation:"bFlash .6s ease-out forwards"}}/>}
        {[...Array(7)].map((_,i)=>(
          <div key={i} style={{position:"absolute",left:0,right:0,top:`${i*(100/7)}%`,height:`${100/7+0.6}%`,
            background:"#020c18",transformOrigin:i%2?"right":"left",
            animation:`${phase==="in"?"barIn":"barOut"} ${phase==="in"?.42:.34}s ease-${phase==="in"?"in":"out"} forwards`,
            animationDelay:`${(phase==="in"?i:6-i)*0.035}s`,
            transform:phase==="in"?"scaleX(0)":"scaleX(1)"}}/>
        ))}
      </div>
    );
  }
  // Sanftes Abblenden für Karte/Stadt/Menüs
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,pointerEvents:"none",background:"#020c18",
      animation:`${phase==="in"?"fadeIn":"fadeOut"} ${phase==="in"?.26:.3}s ease-${phase==="in"?"in":"out"} forwards`,
      opacity:phase==="in"?0:1}}>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes fadeOut{from{opacity:1}to{opacity:0}}`}</style>
    </div>
  );
}

function BattleBackdrop({scene}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    let raf,fr=0;
    const resize=()=>{cv.width=cv.clientWidth;cv.height=cv.clientHeight;};
    resize();
    const onR=()=>resize();window.addEventListener("resize",onR);
    const ctx=cv.getContext("2d");
    const PAL={
      lake:   {sky:["#0b2f52","#134b73"],sun:"#7dd3fc",water:["#0b4f7e","#062f4d"],land:"#1a6b34"},
      harbor: {sky:["#0a2540","#1b3f5e"],sun:"#93c5fd",water:["#0d4468","#062b45"],land:"#3f4756"},
      arena:  {sky:["#2a1206","#4a220c"],sun:"#fbbf24",water:null,land:"#7c2d12"},
      deep:   {sky:["#03121f","#062033"],sun:"#22d3ee",water:["#062033","#010a12"],land:null},
      night:  {sky:["#050b1c","#0b1836"],sun:"#a5b4fc",water:["#08263f","#04121f"],land:"#123d2a"},
    };
    const P=PAL[scene]||PAL.lake;
    const loop=()=>{
      fr++;
      const W=cv.width,H=cv.height;if(!W||!H){raf=requestAnimationFrame(loop);return;}
      // Himmel
      const g=ctx.createLinearGradient(0,0,0,H*.62);
      g.addColorStop(0,P.sky[0]);g.addColorStop(1,P.sky[1]);
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      // Sterne (nachts / Tiefsee)
      if(scene==="night"||scene==="deep"){
        for(let i=0;i<26;i++){
          const h=(i*2654435761)>>>0;
          const x=(h%W),y=((h>>7)%Math.round(H*.5));
          const tw=.35+Math.sin(fr*.05+i)*.3;
          ctx.fillStyle=`rgba(226,240,255,${Math.max(0,tw)})`;
          ctx.fillRect(x,y,2,2);
        }
      }
      // Sonne / Mond / Leuchten
      const cx=W*.76,cy=H*.2;
      ctx.fillStyle=P.sun;ctx.globalAlpha=.18;
      ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*.16,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=.75;
      ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*.065,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      if(scene==="arena"){
        // Arena: Ränge + Fackeln statt Wasser
        ctx.fillStyle="#3f1d0a";ctx.fillRect(0,H*.34,W,H*.66);
        ctx.fillStyle="#5a2b10";
        for(let r=0;r<3;r++)ctx.fillRect(0,H*.34+r*H*.09,W,H*.055);
        for(let i=0;i<6;i++){
          const fx=W*(.08+i*.17),fy=H*.36;
          const fl=.55+Math.sin(fr*.13+i*1.7)*.4;
          ctx.fillStyle="#57534e";ctx.fillRect(fx-2,fy,4,H*.1);
          ctx.fillStyle=`rgba(251,146,60,${fl})`;
          ctx.beginPath();ctx.ellipse(fx,fy-4,5,9+Math.sin(fr*.2+i)*2,0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle=`rgba(253,224,71,${fl*.9})`;
          ctx.beginPath();ctx.ellipse(fx,fy-3,2.5,5,0,0,Math.PI*2);ctx.fill();
        }
        ctx.fillStyle=P.land;ctx.fillRect(0,H*.66,W,H*.34);
        ctx.fillStyle="rgba(0,0,0,.18)";
        for(let i=0;i<W;i+=18)ctx.fillRect(i,H*.66,9,H*.34);
      }else{
        // Ferne Uferlinie / Berge
        if(P.land){
          ctx.fillStyle="rgba(12,40,30,.85)";
          ctx.beginPath();ctx.moveTo(0,H*.56);
          for(let x=0;x<=W;x+=W/8){
            const hgt=H*.56-(Math.sin(x*.006+2)*H*.05+H*.04);
            ctx.lineTo(x,hgt);
          }
          ctx.lineTo(W,H*.62);ctx.lineTo(0,H*.62);ctx.closePath();ctx.fill();
        }
        // Wasserfläche
        if(P.water){
          const wg=ctx.createLinearGradient(0,H*.6,0,H);
          wg.addColorStop(0,P.water[0]);wg.addColorStop(1,P.water[1]);
          ctx.fillStyle=wg;ctx.fillRect(0,H*.6,W,H*.4);
          // Lichtreflex-Bahn unter der Sonne
          ctx.fillStyle=P.sun;
          for(let i=0;i<9;i++){
            const yy=H*.63+i*(H*.04);
            const ww=(W*.16)*(1-i*.07)+Math.sin(fr*.06+i)*7;
            ctx.globalAlpha=.14-i*.012;
            if(ctx.globalAlpha>0)ctx.fillRect(cx-ww/2,yy,ww,2.5);
          }
          ctx.globalAlpha=1;
          // Wellenlinien
          ctx.strokeStyle="rgba(147,197,253,.16)";ctx.lineWidth=2;
          for(let i=0;i<5;i++){
            const yy=H*.64+i*(H*.07);
            ctx.beginPath();
            for(let x=0;x<=W;x+=8)ctx.lineTo(x,yy+Math.sin(x*.03+fr*.04+i)*2.5);
            ctx.stroke();
          }
        }
        // Aufsteigende Blasen in der Tiefsee
        if(scene==="deep"){
          for(let i=0;i<14;i++){
            const h=(i*2246822519)>>>0;
            const x=(h%W);
            const y=H-((fr*1.1+ (h>>5)%H)%(H*1.05));
            const r=1.5+(h%3);
            ctx.fillStyle="rgba(165,243,252,.30)";
            ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
          }
        }
      }
      // Vignette für Fokus aufs UI
      const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.25,W/2,H/2,Math.max(W,H)*.72);
      vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(2,8,18,.72)");
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",onR);};
  },[scene]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",zIndex:0,pointerEvents:"none"}}/>;
}

function BattleScreen({data,player,onWin,onLose}){
  const bref=useRef({pTeam:player.team.map(m=>({...m})),eTeam:data.enemies.map(m=>({...m})),pIdx:0,eIdx:0,log:[data.isTrainer?`${data.trainerName} fordert heraus!`:`Wilder ${data.enemies[0].name} erscheint!`],shakeP:false,shakeE:false,phase:"player"});
  const [,rr]=useState(0);const tick=()=>rr(n=>n+1);
  const [anim,setAnim]=useState(null); // {side,phase,moveName,dmg,color,isBuff}
  const [showSwitch,setShowSwitch]=useState(false);
  const busy=useRef(false);
  const bs=bref.current;const pm=bs.pTeam[bs.pIdx];const em=bs.eTeam[bs.eIdx];
  const addLog=m=>{bs.log=[...bs.log.slice(-4),m];tick();};
  function shake(w){bs[w==="p"?"shakeP":"shakeE"]=true;tick();setTimeout(()=>{bs[w==="p"?"shakeP":"shakeE"]=false;tick();},360);}

  function triggerAnim(cfg){
    AUDIO.sfx(cfg.isBuff?"buff":"cast");
    setTimeout(()=>AUDIO.sfx(cfg.dmg>=45?"crit":"hit"),300);
    setAnim({...cfg,phase:1});
    setTimeout(()=>setAnim(a=>a?{...a,phase:2}:null),300);
    setTimeout(()=>setAnim(null),750);
  }

  function enemyTurn(){
    const ce=bs.eTeam[bs.eIdx];const cp=bs.pTeam[bs.pIdx];
    const atks=ce.moves.filter(mv=>MOVES[mv]?.p>0);
    const mv=atks[Math.floor(Math.random()*atks.length)]||ce.moves[0];
    const dmg=calcDmg(ce,cp,mv);
    triggerAnim({side:"e",moveName:mv,dmg,color:ce.color,isBuff:false});
    addLog(`${ce.name} → ${mv}: ${dmg} Schaden!`);
    shake("p");
    const nHp=Math.max(0,cp.hp-dmg);
    setTimeout(()=>{bs.pTeam[bs.pIdx]={...cp,hp:nHp};tick();setTimeout(()=>{if(nHp<=0){addLog(`${cp.name} besiegt!`);const npi=bs.pIdx+1;if(npi<bs.pTeam.length){bs.pIdx=npi;addLog(`${bs.pTeam[npi].name} weiter!`);busy.current=false;tick();}else{bs.phase="ended";tick();setTimeout(()=>onLose(),900);}}else{busy.current=false;tick();}},300);},350);
  }

  function useMove(mv){
    if(busy.current||bs.phase!=="player")return;
    busy.current=true;
    const move=MOVES[mv];const cp=bs.pTeam[bs.pIdx];const ce=bs.eTeam[bs.eIdx];
    if(move.buff){
      triggerAnim({side:"p",moveName:mv,dmg:0,color:cp.color,isBuff:true});
      const k=`${move.buff}Mod`;bs.pTeam[bs.pIdx]={...cp,[k]:(cp[k]||0)+1};
      addLog(`${cp.name}: ${mv}! ↑`);
      setTimeout(()=>enemyTurn(),700);return;
    }
    const dmg=calcDmg(cp,ce,mv);
    triggerAnim({side:"p",moveName:mv,dmg,color:cp.color,isBuff:false});
    addLog(`${cp.name} → ${mv}: ${dmg} Schaden!`);
    shake("e");
    const nEHp=Math.max(0,ce.hp-dmg);
    setTimeout(()=>{bs.eTeam[bs.eIdx]={...ce,hp:nEHp};tick();setTimeout(()=>{if(nEHp<=0){addLog(`${ce.name} besiegt! ✓`);const nei=bs.eIdx+1;if(nei<bs.eTeam.length){bs.eIdx=nei;addLog(`${bs.eTeam[nei].name} tritt an!`);busy.current=false;tick();}else{bs.phase="ended";tick();setTimeout(()=>onWin(data.cityId,data.finale||false,null),900);}}else{setTimeout(()=>enemyTurn(),320);}},200);},380);
  }

  const catchNoRoom=(player.team?.length||0)>=3 && (player.box?.length||0)>=BOX_MAX;
  function tryCatch(){
    if(busy.current||data.isTrainer||bs.phase!=="player")return;
    if(catchNoRoom){addLog("Box voll! Lass erst eines frei.");tick();return;}
    busy.current=true;
    const ce=bs.eTeam[bs.eIdx];
    const baitBonus=(player.baits||[]).reduce((s,bk)=>s+(BAITS[bk]?.bonus||0),0);
    const chance=ce.catch*(1.5-(ce.hp/ce.maxHp)*.8)+baitBonus;
    AUDIO.sfx("reel");addLog(`Angelrute ausgeworfen... 🎣`);tick();
    setTimeout(()=>{if(Math.random()*100<chance){AUDIO.sfx("catch");addLog(`${ce.name} gefangen! 🎉`);bs.phase="ended";tick();setTimeout(()=>onWin(data.cityId,false,{...ce}),1000);}else{addLog(`${ce.name} entkam!`);setTimeout(()=>enemyTurn(),350);}},1100);
  }

  function doSwitch(idx){
    if(busy.current||bs.phase!=="player")return;
    if(idx===bs.pIdx||bs.pTeam[idx].hp<=0)return;
    busy.current=true;setShowSwitch(false);
    bs.pIdx=idx;addLog(`${bs.pTeam[idx].name} kommt in den Kampf!`);tick();
    setTimeout(()=>enemyTurn(),700);
  }
  const aliveCount=bref.current.pTeam.filter(m=>m.hp>0).length;

  const hpP=m=>Math.round(m.hp/m.maxHp*100);const dis=busy.current||bs.phase!=="player";
  // Kulisse passend zum Anlass
  const scene=data.walox?"deep":data.rival?"night":data.isTrainer?"arena":"lake";

  return(
    <div style={{width:"100%",height:"100%",background:"#020c18",display:"flex",flexDirection:"column",padding:"8px",gap:"6px",position:"relative",overflow:"hidden"}}>
      <BattleBackdrop scene={scene}/>
      {/* CSS for animations */}
      <style>{`
        @keyframes monIdle{from{transform:translateY(0)}to{transform:translateY(-5px)}}
        @keyframes floatDmg{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-48px);opacity:0}}
        @keyframes atkBounce{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-4deg)}100%{transform:scale(1) rotate(0deg)}}
        @keyframes hitFlash{0%{opacity:.75}100%{opacity:0}}
        @keyframes slideInR{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideInL{from{transform:translateX(-28px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slashFade{0%{opacity:1;scaleX:.2}100%{opacity:0;scaleX:1}}
        @keyframes buffSpark{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.8}100%{transform:scale(1);opacity:0}}
      `}</style>

      {/* Enemy area */}
      <div style={{flex:"0 0 30%",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:12,background:"rgba(3,16,32,.72)",border:"1px solid rgba(30,90,138,.55)",backdropFilter:"blur(1px)",zIndex:1,padding:"8px 14px",borderRadius:4,position:"relative",overflow:"hidden"}}>
        {/* Enemy hit flash overlay */}
        {anim?.side==="p"&&anim?.phase===2&&<div style={{position:"absolute",inset:0,background:"white",opacity:.35,animation:"hitFlash .35s ease-out forwards",pointerEvents:"none",zIndex:2}}/>}
        {/* Slash effect (player attacks) */}
        {anim?.side==="p"&&anim?.phase===1&&!anim?.isBuff&&<div style={{position:"absolute",top:"30%",left:"10%",width:"65%",height:5,background:`linear-gradient(90deg,transparent,${anim.color},white)`,transform:"rotate(-18deg)",borderRadius:3,boxShadow:`0 0 10px ${anim.color}`,animation:"slashFade .35s ease-out forwards",zIndex:3}}/>}
        {/* Damage number over enemy */}
        {anim?.side==="p"&&anim?.phase===2&&anim?.dmg>0&&<div style={{position:"absolute",top:"10%",right:"12%",color:"white",fontSize:"clamp(14px,3vw,24px)",fontWeight:"bold",textShadow:`0 2px 6px #000,0 0 14px ${em.color}`,animation:"floatDmg .75s ease-out forwards",zIndex:4,pointerEvents:"none"}}>-{anim.dmg}</div>}
        {/* Enemy sprite */}
        <div style={{textAlign:"right"}}>
          {data.isTrainer&&<div style={{color:"#f87171",fontSize:"clamp(5px,.8vw,7px)",marginBottom:3}}>⚔️ {data.trainerName}</div>}
          <div style={{color:em.color,fontSize:"clamp(6px,1.2vw,10px)"}}>{em.name}{em.level?` Lv${em.level}`:""}</div>
          <div style={{color:"#334155",fontSize:"clamp(5px,.8vw,7px)"}}>[{em.type}] 🎣{em.catch}%</div>
          <div style={{width:110,height:7,background:"#0e1a2a",borderRadius:4,margin:"4px 0 2px",overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(em)}%`,background:hpCol(hpP(em)),transition:"width .35s"}}/></div>
          <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,7px)"}}>{em.hp}/{em.maxHp} HP</div>
        </div>
        <div style={{transform:bs.shakeE?"translateX(14px)":"none",transition:"transform .08s",filter:`drop-shadow(0 0 12px ${em.color}70)`,animation:anim?.side==="p"&&anim?.phase===1&&!anim?.isBuff?"atkBounce .35s ease-out":"monIdle 2s ease-in-out infinite alternate"}}>
          <MonSprite monKey={em.key} size={Math.min(100,Math.max(60,typeof window!=="undefined"?window.innerWidth/10:80))} flip idle={!(anim?.side==="p"&&anim?.phase===1)}/>
        </div>
      </div>

      {/* Move name banner */}
      {anim?.phase===1&&<div style={{position:"absolute",top:"28%",left:"50%",transform:"translateX(-50%)",color:anim.color,fontSize:"clamp(7px,1.4vw,11px)",textShadow:`0 0 12px ${anim.color},0 0 24px ${anim.color}`,background:"rgba(2,12,24,.88)",padding:"5px 12px",border:`1px solid ${anim.color}40`,borderRadius:3,animation:anim.side==="p"?"slideInR .25s ease-out":"slideInL .25s ease-out",zIndex:10,whiteSpace:"nowrap"}}>
        {anim.isBuff?"✨":anim.side==="p"?"⚡→":"←⚡"} {anim.moveName}
      </div>}

      {/* Player area */}
      <div style={{flex:"0 0 22%",display:"flex",alignItems:"center",gap:12,background:"rgba(3,16,32,.72)",border:"1px solid rgba(30,90,138,.55)",backdropFilter:"blur(1px)",zIndex:1,padding:"8px 14px",borderRadius:4,position:"relative",overflow:"hidden"}}>
        {/* Player hit flash */}
        {anim?.side==="e"&&anim?.phase===2&&<div style={{position:"absolute",inset:0,background:"white",opacity:.3,animation:"hitFlash .35s ease-out forwards",pointerEvents:"none",zIndex:2}}/>}
        {/* Enemy slash effect */}
        {anim?.side==="e"&&anim?.phase===1&&<div style={{position:"absolute",top:"25%",right:"10%",width:"55%",height:5,background:`linear-gradient(270deg,transparent,${anim.color},white)`,transform:"rotate(18deg)",borderRadius:3,boxShadow:`0 0 10px ${anim.color}`,animation:"slashFade .35s ease-out forwards",zIndex:3}}/>}
        {/* Damage number over player */}
        {anim?.side==="e"&&anim?.phase===2&&anim?.dmg>0&&<div style={{position:"absolute",top:"8%",left:"12%",color:"white",fontSize:"clamp(14px,3vw,24px)",fontWeight:"bold",textShadow:`0 2px 6px #000,0 0 14px ${pm.color}`,animation:"floatDmg .75s ease-out forwards",zIndex:4,pointerEvents:"none"}}>-{anim.dmg}</div>}
        {/* Buff sparkle */}
        {anim?.side==="p"&&anim?.phase===1&&anim?.isBuff&&<div style={{position:"absolute",top:"10%",left:"30%",fontSize:"clamp(16px,3vw,26px)",animation:"buffSpark .5s ease-out forwards",zIndex:4}}>✨</div>}
        <div style={{transform:`${bs.shakeP?"translateX(-14px)":"none"} ${anim?.side==="e"&&anim?.phase===1?"rotate(2deg)":""}`,transition:"transform .08s",filter:`drop-shadow(0 0 10px ${pm.color}70)`,animation:"monIdle 2.4s ease-in-out infinite alternate"}}>
          <MonSprite monKey={pm.key} size={Math.min(85,Math.max(50,typeof window!=="undefined"?window.innerWidth/12:70))} idle/>
        </div>
        <div style={{flex:1}}>
          <div style={{color:pm.color,fontSize:"clamp(6px,1.2vw,10px)"}}>{pm.name}{pm.level?` Lv${pm.level}`:""}</div>
          <div style={{color:"#334155",fontSize:"clamp(5px,.8vw,7px)"}}>[{pm.type}]</div>
          <div style={{width:110,height:7,background:"#0e1a2a",borderRadius:4,margin:"4px 0 2px",overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(pm)}%`,background:hpCol(hpP(pm)),transition:"width .35s"}}/></div>
          <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,7px)"}}>{pm.hp}/{pm.maxHp} HP</div>
        </div>
        <div style={{textAlign:"center"}}><div style={{color:"#334155",fontSize:"clamp(4px,.6vw,6px)",marginBottom:3}}>Team</div><div style={{display:"flex",gap:2}}>{bs.pTeam.map((m,i)=><div key={i} style={{opacity:i===bs.pIdx?1:.28,filter:`drop-shadow(0 0 3px ${m.color})`}}><MonSprite monKey={m.key} size={18}/></div>)}</div></div>
      </div>

      <div style={{background:"rgba(2,14,26,.82)",border:"1px solid rgba(30,90,138,.5)",padding:"7px 10px",minHeight:46,zIndex:1}}>
        {bs.log.slice(-2).map((l,i,arr)=><div key={i} style={{color:i===arr.length-1?"#e0f2fe":"#334155",fontSize:"clamp(6px,1vw,9px)",lineHeight:1.7}}>{l}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,position:"relative",zIndex:1}}>
        {pm.moves.map(mv=>(<button key={mv} onClick={()=>useMove(mv)} disabled={dis} style={{...G(MOVES[mv]?.buff?"#0d0a20":"#020a1a",MOVES[mv]?.buff?"#c084fc":"#38bdf8"),opacity:dis?.38:1}}>{MOVES[mv]?.buff?"✨":"⚡"} {mv}{MOVES[mv]?.p>0&&` (${MOVES[mv].p})`}</button>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:data.isTrainer?"1fr":"1fr 1fr",gap:5,position:"relative",zIndex:1}}>
        {aliveCount>1&&<button onClick={()=>setShowSwitch(true)} disabled={dis} style={{...G("#0a1420","#7dd3fc",{textAlign:"center"}),opacity:dis?.38:1}}>🔄 Wechseln</button>}
        {!data.isTrainer&&<button onClick={tryCatch} disabled={dis||catchNoRoom} style={{...G("#041a0c","#4ade80",{textAlign:"center"}),opacity:(dis||catchNoRoom)?.38:1}}>{catchNoRoom?"🎣 Box voll":"🎣 Fangen"}</button>}
      </div>

      {showSwitch&&<div style={{position:"absolute",inset:0,background:"rgba(2,12,24,.94)",zIndex:30,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:16}}>
        <div style={{color:"#7dd3fc",fontSize:"clamp(7px,1.4vw,11px)"}}>🔄 AQUARIUMMON WECHSELN</div>
        <div style={{color:"#475569",fontSize:"clamp(4px,.8vw,7px)",textAlign:"center",marginBottom:4}}>Wechseln kostet einen Zug — der Gegner greift danach an.</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",maxWidth:340}}>
          {bs.pTeam.map((m,i)=>{
            const fainted=m.hp<=0,active=i===bs.pIdx,canPick=!fainted&&!active;
            return(
              <button key={i} onClick={()=>canPick&&doSwitch(i)} disabled={!canPick}
                style={{display:"flex",alignItems:"center",gap:10,padding:8,background:active?"#062040":canPick?"#041624":"#0a0a14",border:`1px solid ${active?m.color:canPick?"#1e5a8a":"#1e293b"}`,borderRadius:5,cursor:canPick?"pointer":"default",opacity:fainted?.4:1,fontFamily:"inherit"}}>
                <div style={{filter:`drop-shadow(0 0 4px ${m.color})`}}><MonSprite monKey={m.key} size={32}/></div>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{color:m.color,fontSize:"clamp(5px,.9vw,8px)"}}>{m.name}{active?" (aktiv)":fainted?" (K.O.)":""}</div>
                  <div style={{width:90,height:5,background:"#0e1a2a",borderRadius:3,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(m)}%`,background:hpCol(hpP(m))}}/></div>
                  <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,6px)",marginTop:2}}>{m.hp}/{m.maxHp} HP</div>
                </div>
                {canPick&&<span style={{color:"#7dd3fc",fontSize:"clamp(6px,1vw,9px)"}}>►</span>}
              </button>
            );
          })}
        </div>
        <button onClick={()=>setShowSwitch(false)} style={{...G("#0a0a14","#475569"),marginTop:6}}>← Abbrechen</button>
      </div>}
    </div>
  );
}

function RivalEndScreen({onContinue}){return(<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 50% 45%,#241033,#020c18)",gap:14,padding:24,textAlign:"center"}}><div style={{fontSize:"3rem"}}>🥷</div><div style={{color:"#c084fc",fontSize:"clamp(11px,2.3vw,20px)",textShadow:"0 0 20px #7c3aed"}}>RIVALE YURI</div><div style={{color:"#e9d5ff",fontSize:"clamp(6px,1.3vw,11px)",lineHeight:2,maxWidth:440}}>„Stark — aber noch nicht stark genug. Trainiere deine Aquariummon, entwickle sie weiter und fordere mich erneut heraus."</div><button onClick={onContinue} style={{...G("#041624","#c084fc"),marginTop:10}}>↩ Weiterspielen</button></div>);}
function RivalWinScreen({onContinue}){return(<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 50% 45%,#0a2a1a,#020c18)",gap:14,padding:24,textAlign:"center"}}><div style={{fontSize:"3rem"}}>🏆</div><div style={{color:"#fde047",fontSize:"clamp(11px,2.4vw,22px)",textShadow:"0 0 22px #ca8a04"}}>RIVALE YURI BEZWUNGEN!</div><div style={{color:"#e9d5ff",fontSize:"clamp(6px,1.3vw,11px)",lineHeight:2,maxWidth:440}}>Yuri: „Unglaublich... du bist der wahre Champion des Bodensees!"</div><div style={{color:"#a3e635",fontSize:"clamp(6px,1.2vw,10px)",lineHeight:1.9,maxWidth:440,marginTop:4}}>💬 Über Feedback würde ich mich sehr freuen — damit es künftig noch mehr zu erleben gibt!</div><button onClick={onContinue} style={{...G("#041a0c","#4ade80"),marginTop:10}}>↩ Weiterspielen</button></div>);}
function EvolveScreen({fromKey,toKey,onDone}){
  const [phase,setPhase]=useState(0); // 0 start, 1 flash, 2 revealed
  useEffect(()=>{const a=setTimeout(()=>setPhase(1),900);const b=setTimeout(()=>setPhase(2),1900);return()=>{clearTimeout(a);clearTimeout(b);};},[]);
  const key=phase<2?fromKey:toKey;
  return(
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 50% 45%,#0b1e3a,#020c18)",gap:16,padding:24,textAlign:"center",overflow:"hidden"}}>
      <style>{`@keyframes evoFlash{0%{filter:brightness(1)}50%{filter:brightness(6) saturate(0)}100%{filter:brightness(1)}}@keyframes evoSpin{0%{transform:scale(1) rotate(0)}100%{transform:scale(1.08) rotate(360deg)}}`}</style>
      <div style={{color:"#a5b4fc",fontSize:"clamp(8px,1.6vw,13px)"}}>{phase<2?"⭐ Entwicklung...":"✨ Entwicklung abgeschlossen!"}</div>
      <div style={{animation:phase===1?"evoFlash .5s linear infinite, evoSpin 1s linear infinite":"monIdle 2s ease-in-out infinite alternate",filter:`drop-shadow(0 0 ${phase<2?18:26}px ${MONS[key].color})`}}>
        <MonSprite monKey={key} size={140}/>
      </div>
      {phase===2&&<>
        <div style={{color:MONS[toKey].color,fontSize:"clamp(9px,1.9vw,15px)",textShadow:`0 0 14px ${MONS[toKey].color}`}}>{MONS[fromKey].name} → {MONS[toKey].name}!</div>
        <div style={{color:"#7dd3fc",fontSize:"clamp(5px,1vw,8px)",lineHeight:1.8}}>{MONS[toKey].type} · HP{MONS[toKey].maxHp} ATK{MONS[toKey].atk} DEF{MONS[toKey].def}</div>
        <button onClick={onDone} style={{...G("#041a0c","#4ade80"),marginTop:6}}>Weiter</button>
      </>}
    </div>
  );
}
