<script>
window.__failed=false;
function showErr(msg){
  window.__failed=true;
  var l=document.getElementById('loading'); if(l)l.style.display='none';
  var e=document.getElementById('err'); if(e){e.style.display='flex';}
  var m=document.getElementById('errmsg'); if(m)m.textContent=msg;
}
window.addEventListener('error',function(ev){
  showErr((ev.message||'Unbekannter Fehler')+(ev.filename?(' @ '+ev.filename.split('/').pop()+':'+ev.lineno):''));
});
function libFail(name){return function(){showErr('Konnte '+name+' nicht laden. Bitte Internetverbindung prüfen und Seite neu laden.');};}
</script>

async function saveGame(data){

}
async function loadSave(){

}

/* ═══════════════════════════════════════════════════ MAP ENGINE ═══ */
const MAP_W=58,MAP_H=38,TS=32;
const T_TREE=0,T_GRASS=1,T_PATH=2,T_WATER=3,T_SAND=4,T_HOUSE=10,T_OWPIER=11,T_WALOX=12;
const WALOX_TILE={x:33,y:20}; // Stand am Stegende, von dem aus Walox in der Seemitte erscheint
function buildMap(){
  const m=Array.from({length:MAP_H},()=>new Uint8Array(MAP_W).fill(T_GRASS));
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++)if(x<2||x>=MAP_W-2||y<2||y>=MAP_H-2)m[y][x]=T_TREE;
  [[3,3,5,4],[27,2,8,3],[50,3,6,4],[2,26,4,8],[52,26,4,8]].forEach(([x,y,w,h])=>{
    for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)if(m[y+dy])m[y+dy][x+dx]=T_TREE;
  });
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const a=(x-27)/17,b=(y-19)/7,c=(x-40)/12,d=(y-20)/5.5;
    if(a*a+b*b<1||c*c+d*d<0.88)m[y][x]=T_WATER;
  }
  const snap=m.map(r=>new Uint8Array(r));
  for(let y=1;y<MAP_H-1;y++)for(let x=1;x<MAP_W-1;x++)
    if(snap[y][x]===T_GRASS&&[[0,1],[0,-1],[1,0],[-1,0]].some(([dy,dx])=>snap[y+dy]?.[x+dx]===T_WATER))m[y][x]=T_SAND;
  const addH=(y,x1,x2)=>{for(let x=x1;x<=x2;x++)if(m[y]?.[x]!==T_WATER&&m[y]?.[x]!==T_TREE)m[y][x]=T_PATH;};
  const addV=(x,y1,y2)=>{for(let y=y1;y<=y2;y++)if(m[y]?.[x]!==T_WATER&&m[y]?.[x]!==T_TREE)m[y][x]=T_PATH;};
  addH(11,4,54);addH(27,4,54);addV(8,11,27);
  // Steg von der Südküste in die Seemitte (über Wasser, begehbar)
  for(let y=21;y<=26;y++)m[y][WALOX_TILE.x]=T_OWPIER;
  m[WALOX_TILE.y][WALOX_TILE.x]=T_WALOX;
  [[5,14,27,12,29,5,3],[6,10,11,8,5,5,6],[7,30,11,28,4,6,7],[8,47,11,45,5,5,6],[9,50,27,48,29,5,3]]
    .forEach(([tile,ex,ey,bx,by,bw,bh])=>{
      for(let dy=0;dy<bh;dy++)for(let dx=0;dx<bw;dx++)if(m[by+dy]?.[bx+dx]!==undefined&&m[by+dy][bx+dx]!==T_WATER)m[by+dy][bx+dx]=T_HOUSE;
      if(m[ey]?.[ex]!==undefined)m[ey][ex]=tile;
    });
  return m;
}
const THE_MAP=buildMap();
const OW={pos:{x:18*TS+TS/2,y:27*TS+TS/2},facing:"left"};

/* ───── CITY INTERIOR (walkable sub-map, shared by all towns) ───── */
const KW=20,KH=14,KTS=32;
const K_ARENA=20,K_CENTER=21,K_EXIT=22,K_PIER=23;
function buildCityMap(){
  const m=Array.from({length:KH},()=>new Uint8Array(KW).fill(T_GRASS));
  for(let y=0;y<KH;y++)for(let x=0;x<KW;x++)if(x===0||x===KW-1||y===0||y===KH-1)m[y][x]=T_TREE;
  // Arena building block (top-left)
  for(let y=2;y<=5;y++)for(let x=2;x<=7;x++)m[y][x]=T_HOUSE;
  // Center building block (top-right)
  for(let y=2;y<=5;y++)for(let x=12;x<=17;x++)m[y][x]=T_HOUSE;
  // Paths
  for(let x=1;x<KW-1;x++)m[7][x]=T_PATH;
  for(let y=1;y<=12;y++)m[y][10]=T_PATH;
  for(let y=6;y<=7;y++)m[y][4]=T_PATH;
  for(let y=6;y<=7;y++)m[y][15]=T_PATH;
  // Pond (bottom-left) + sandy edge
  for(let y=10;y<=12;y++)for(let x=2;x<=5;x++)m[y][x]=T_WATER;
  for(let x=2;x<=6;x++)if(m[9][x]===T_GRASS)m[9][x]=T_SAND;
  m[11][6]=T_SAND;
  // Pier (fishing trigger) jutting into pond
  m[11][6]=K_PIER;
  // Entrances
  m[6][4]=K_ARENA;
  m[6][15]=K_CENTER;
  // Exit south
  m[13][10]=K_EXIT;
  return m;
}
const KMAP=buildCityMap();
const KDECO={fountain:{x:13,y:10},lamps:[{x:6,y:7},{x:13,y:7}],flowers:[{x:8,y:10},{x:14,y:9},{x:17,y:10},{x:16,y:11},{x:8,y:12}]};
function cityEntryPos(){return {pos:{x:10*KTS+KTS/2,y:12*KTS+KTS/2},facing:"up"};}
const K_OW=cityEntryPos();

function drawCityTile(ctx,t,px,py,S,fr,gx=0,gy=0){
  if(t===K_ARENA){
    ctx.fillStyle="#92400e";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#451a03";ctx.fillRect(px+2,py+S*.35,S-4,S*.65);
    ctx.fillStyle="#7c2d12";ctx.fillRect(px+S*.12,py+S*.4,S*.76,S*.5);
    ctx.fillStyle="#dc2626";ctx.fillRect(px+S*.3,py+1,S*.4,S*.34);
    ctx.fillStyle="#fef08a";ctx.font=`bold ${S*.4|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("⚔",px+S/2,py+S*.62);
  }else if(t===K_CENTER){
    ctx.fillStyle="#f1f5f9";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#cbd5e1";ctx.fillRect(px+1,py+1,S-2,S*.3);
    const pulse=.55+Math.sin(fr*.06)*.25;
    ctx.fillStyle=`rgba(239,68,68,${pulse})`;
    ctx.fillRect(px+S*.42,py+S*.18,S*.16,S*.64);ctx.fillRect(px+S*.18,py+S*.42,S*.64,S*.16);
  }else if(t===K_EXIT){
    ctx.fillStyle="#92400e";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#a16207";ctx.fillRect(px+2,py+2,S-4,S-4);
    ctx.fillStyle="#fde047";ctx.font=`bold ${S*.5|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("▼",px+S/2,py+S*.52);
  }else if(t===K_PIER){
    drawTile(ctx,T_SAND,px,py,S,fr,gx,gy);
    ctx.fillStyle="#78350f";ctx.fillRect(px+S*.1,py+S*.35,S*.8,S*.3);
    ctx.fillStyle="#92400e";for(let i=0;i<4;i++)ctx.fillRect(px+S*.1+i*S*.22,py+S*.35,S*.06,S*.3);
    ctx.fillStyle="#fde047";ctx.font=`bold ${S*.34|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("🎣",px+S/2,py+S*.5);
  }else drawTile(ctx,t,px,py,S,fr,gx,gy);
}
function drawCityDeco(ctx,camX,camY,fr){
  const fx=KDECO.fountain.x*KTS-camX+KTS/2,fy=KDECO.fountain.y*KTS-camY+KTS/2;
  ctx.fillStyle="#1e3a5f";ctx.beginPath();ctx.arc(fx,fy,15,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#475569";ctx.lineWidth=2;ctx.stroke();
  const wob=Math.sin(fr*.08)*2;
  ctx.fillStyle="rgba(125,211,252,.7)";ctx.beginPath();ctx.arc(fx,fy-2+wob*.3,9,0,Math.PI*2);ctx.fill();
  for(let i=0;i<4;i++){const a=fr*.05+i*Math.PI/2;ctx.fillStyle="rgba(186,230,253,.8)";ctx.beginPath();ctx.arc(fx+Math.cos(a)*6,fy+Math.sin(a)*6-6-Math.abs(wob),1.6,0,Math.PI*2);ctx.fill();}
  KDECO.lamps.forEach(({x,y})=>{
    const lx=x*KTS-camX+KTS/2,ly=y*KTS-camY+KTS/2;
    ctx.fillStyle="#44403c";ctx.fillRect(lx-2,ly-4,4,22);
    const glow=.5+Math.sin(fr*.05+x)*.25;
    ctx.fillStyle=`rgba(253,224,71,${glow})`;ctx.beginPath();ctx.arc(lx,ly-8,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fde047";ctx.beginPath();ctx.arc(lx,ly-8,3,0,Math.PI*2);ctx.fill();
  });
  KDECO.flowers.forEach(({x,y},i)=>{
    const fx2=x*KTS-camX+KTS/2,fy2=y*KTS-camY+KTS/2;
    const cols=["#fb7185","#fbbf24","#f472b6","#a3e635"];
    for(let j=0;j<3;j++){ctx.fillStyle=cols[(i+j)%cols.length];ctx.beginPath();ctx.arc(fx2+j*5-5,fy2+(j%2)*4,2.2,0,Math.PI*2);ctx.fill();}
  });
}

/* ───── TILE DRAW ───── */
function drawTile(ctx,t,px,py,S,fr,gx=0,gy=0){
  if(t===T_TREE){
    ctx.fillStyle="#0a1a06";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.ellipse(px+S/2,py+S*.92,S*.36,S*.1,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#5c3a1e";ctx.fillRect(px+S*.46,py+S*.7,S*.08,S*.26);
    const sw=Math.sin(fr*.025+gx*1.3+gy*.7)*1.2;
    ctx.fillStyle="#14532d";ctx.beginPath();ctx.arc(px+S/2+sw,py+S*.58,S*.42,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#15803d";ctx.beginPath();ctx.arc(px+S/2+sw,py+S*.4,S*.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#22c55e";ctx.beginPath();ctx.arc(px+S*.44+sw,py+S*.26,S*.16,0,Math.PI*2);ctx.fill();
  }else if(t===T_GRASS){
    ctx.fillStyle="#166534";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#15803d";
    [[4,5,2,5],[12,16,2,5],[22,7,2,5],[18,21,2,4]].forEach(([bx,by,w,h])=>{ctx.fillRect(px+bx,py+by,w,h);ctx.fillRect(px+bx-1,py+by+h-1,w+2,2);});
    const fh=((gx*7+gy*13)>>1)%23; // hash on WORLD tile coords → stable, no flicker
    if(fh<3){const fc=["#fde047","#f9a8d4","#fca5a5"][fh%3];ctx.fillStyle=fc;const fx=px+6+((gx*3+gy*5)%14),fy=py+8+((gx*5+gy)%12);ctx.beginPath();ctx.arc(fx,fy,1.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(fx+2,fy+1,1.6,0,Math.PI*2);ctx.fill();}
  }else if(t===T_PATH){
    ctx.fillStyle="#92400e";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#a16207";ctx.fillRect(px+1,py+1,S-2,S-2);
    ctx.fillStyle="#78350f";[[4,6],[14,11],[22,5],[9,20],[25,18]].forEach(([dx,dy])=>ctx.fillRect(px+dx,py+dy,2,1));
  }else if(t===T_WATER){
    const w=Math.sin(fr*.04+px*.012)*3;
    ctx.fillStyle=`rgb(${12+w|0},${70+w|0},${118+w|0})`;ctx.fillRect(px,py,S,S);
    ctx.strokeStyle="rgba(147,197,253,.22)";ctx.lineWidth=1.5;
    const off=(fr*.45)%S;
    [7,16,24].forEach(oy=>{ctx.beginPath();ctx.moveTo(px,py+oy+off*.12);ctx.quadraticCurveTo(px+S*.5,py+oy-3+off*.12,px+S,py+oy+off*.12);ctx.stroke();});
  }else if(t===T_SAND){
    ctx.fillStyle="#ca8a04";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#a16207";[[4,5],[14,16],[24,7],[8,22],[20,12],[28,20]].forEach(([dx,dy])=>ctx.fillRect(px+dx,py+dy,2,2));
  }else if(t===T_HOUSE){
    ctx.fillStyle="#374151";ctx.fillRect(px,py,S,S);
    ctx.fillStyle="#b91c1c";ctx.fillRect(px,py,S,S*.44|0);
    ctx.fillStyle="#991b1b";ctx.fillRect(px+S*.1|0,py+1,S*.8|0,2);
    ctx.fillStyle="#4b5563";ctx.fillRect(px+1,py+S*.44|0,S-2,S*.56|0-1);
    ctx.fillStyle="#fbbf24";ctx.fillRect(px+S*.28|0,py+S*.55|0,S*.38|0,S*.32|0);
    ctx.fillStyle="#d97706";ctx.fillRect(px+S*.47|0,py+S*.55|0,1,S*.32|0);
  }else if(t===T_OWPIER){
    // Wasser drunter
    drawTile(ctx,T_WATER,px,py,S,fr,gx,gy);
    // Holzplanken
    ctx.fillStyle="#78350f";ctx.fillRect(px+S*.18,py,S*.64,S);
    ctx.fillStyle="#92400e";for(let i=0;i<4;i++)ctx.fillRect(px+S*.18,py+i*S*.26+2,S*.64,S*.16);
    ctx.fillStyle="#5c2c0a";ctx.fillRect(px+S*.18,py,2,S);ctx.fillRect(px+S*.8,py,2,S);
  }else if(t===T_WALOX){
    drawTile(ctx,T_WATER,px,py,S,fr,gx,gy);
    ctx.fillStyle="#78350f";ctx.fillRect(px+S*.18,py,S*.64,S*.7);
    ctx.fillStyle="#92400e";for(let i=0;i<2;i++)ctx.fillRect(px+S*.18,py+i*S*.26+2,S*.64,S*.16);
    ctx.fillStyle="#5c2c0a";ctx.fillRect(px+S*.18,py,2,S*.7);ctx.fillRect(px+S*.8,py,2,S*.7);
  }else{
    const cols=["#dc2626","#2563eb","#7c3aed","#059669","#d97706"];
    ctx.fillStyle="#a16207";ctx.fillRect(px,py,S,S);
    ctx.fillStyle=cols[t-5]||"#fff";ctx.fillRect(px+3,py+3,S-6,S-6);
    ctx.fillStyle="#0f172a";ctx.fillRect(px+S*.28|0,py+S*.22|0,S*.44|0,S*.78|0);
    ctx.fillStyle="white";ctx.font=`bold ${S*.38|0}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("▲",px+S/2,py+S*.35);
  }
}
/* ───── PLAYER DRAW (gender aware) ───── */
function drawPlayer(ctx,px,py,facing,moving,fr,gender="m"){
  const f=gender==="f";
  const leg=moving?(Math.floor(fr/8)%2?3:-3):0;
  const jkt=f?"#0d9488":"#1d4ed8";
  ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.ellipse(px,py+9,9,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#1e293b";ctx.fillRect(px-6,py+3,5,8+leg);ctx.fillRect(px+1,py+3,5,8-leg);
  ctx.fillStyle="#292524";ctx.fillRect(px-7,py+11+leg,6,4);ctx.fillRect(px+1,py+11-leg,6,4);
  ctx.fillStyle=jkt;ctx.fillRect(px-8,py-9,16,13);
  if(facing==="left"){ctx.fillStyle=jkt;ctx.fillRect(px-12,py-7,5,9);}
  else if(facing==="right"){ctx.fillStyle=jkt;ctx.fillRect(px+7,py-7,5,9);}
  else{ctx.fillStyle=jkt;ctx.fillRect(px-12,py-6,5,8);ctx.fillRect(px+7,py-6,5,8);}
  ctx.fillStyle="#fbbf24";ctx.fillRect(px-2,py-11,4,3);
  ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(px,py-15,7.5,0,Math.PI*2);ctx.fill();
  if(f){
    ctx.fillStyle="#1c1917";
    ctx.fillRect(px-8,py-14,3,8);ctx.fillRect(px+5,py-14,3,8);
    ctx.fillRect(px-9,py-12,2,10);ctx.fillRect(px+7,py-12,2,10);
  }
  ctx.fillStyle="#92400e";ctx.fillRect(px-9,py-21,18,5);ctx.fillRect(px-6,py-27,12,7);
  ctx.fillStyle=f?"#f472b6":"#78350f";ctx.fillRect(px-6,py-22,12,2);
  ctx.fillStyle="#0f172a";
  if(facing==="left"){ctx.fillRect(px-4,py-16,2,2);}
  else if(facing==="right"){ctx.fillRect(px+2,py-16,2,2);}
  else if(facing==="up"){ctx.fillRect(px-3,py-18,2,2);ctx.fillRect(px+1,py-18,2,2);}
  else{ctx.fillRect(px-3,py-14,2,2);ctx.fillRect(px+1,py-14,2,2);}
  ctx.strokeStyle="#78350f";ctx.lineWidth=2;ctx.lineCap="round";
  ctx.beginPath();
  if(facing==="right"||facing==="down"){ctx.moveTo(px+8,py-6);ctx.lineTo(px+23,py-20);}
  else{ctx.moveTo(px-8,py-6);ctx.lineTo(px-23,py-20);}
  ctx.stroke();
  ctx.strokeStyle="#94a3b8";ctx.lineWidth=1;
  ctx.beginPath();
  if(facing==="right"||facing==="down"){ctx.moveTo(px+23,py-20);ctx.lineTo(px+27,py-10);}
  else{ctx.moveTo(px-23,py-20);ctx.lineTo(px-27,py-10);}
  ctx.stroke();
}

/* ───── WALOX surfacing in the lake (canvas) ───── */
function drawWaloxOnMap(ctx,cx,cy,fr){
  const bob=Math.sin(fr*.04)*4;
  cy+=bob;
  // ripple rings
  for(let i=0;i<3;i++){const r=18+i*12+((fr*.6)%12);ctx.strokeStyle=`rgba(125,211,252,${.28-i*.08})`;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx,cy+10,r,r*.4,0,0,Math.PI*2);ctx.stroke();}
  // spout
  ctx.strokeStyle="rgba(165,243,252,.85)";ctx.lineWidth=3;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(cx-14,cy-10);ctx.quadraticCurveTo(cx-18,cy-26-Math.abs(bob),cx-12,cy-34-Math.abs(bob));ctx.stroke();
  // body (surfaced back)
  const grad=ctx.createLinearGradient(cx,cy-14,cx,cy+14);grad.addColorStop(0,"#155e75");grad.addColorStop(1,"#0e7490");
  ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(cx,cy,30,15,0,Math.PI,0,true);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,cy,30,15,0,0,Math.PI);ctx.fillStyle="#0c4a6e";ctx.fill();
  // dorsal fin
  ctx.fillStyle="#155e75";ctx.beginPath();ctx.moveTo(cx+4,cy-12);ctx.quadraticCurveTo(cx+10,cy-24,cx+16,cy-11);ctx.fill();
  // tail
  ctx.fillStyle="#0e7490";ctx.beginPath();ctx.moveTo(cx+26,cy-2);ctx.quadraticCurveTo(cx+40,cy-12,cx+44,cy-4);ctx.quadraticCurveTo(cx+40,cy+2,cx+44,cy+8);ctx.quadraticCurveTo(cx+38,cy+4,cx+26,cy+4);ctx.fill();
  // eye + sparkle
  ctx.fillStyle="#0f172a";ctx.beginPath();ctx.arc(cx-16,cy-3,3.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#67e8f9";ctx.beginPath();ctx.arc(cx-16,cy-3,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fde047";ctx.font="bold 12px sans-serif";ctx.textAlign="center";ctx.fillText("★",cx,cy-20-Math.abs(bob));
  // label
  ctx.fillStyle="rgba(34,211,238,.95)";ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.textBaseline="bottom";
  ctx.fillText("WALOX",cx,cy-30-Math.abs(bob));
}

/* ═══════════════════════════════════════════════════ CHARACTER CREATE ═══ */
function CharacterScreen({onDone}){
  const [name,setName]=useState("");
  const [gender,setGender]=useState("m");
  const [err,setErr]=useState("");
  const canvasRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    c.width=100;c.height=110;
    const ctx=c.getContext("2d");
    ctx.imageSmoothingEnabled=false;
    ctx.fillStyle="#041624";ctx.fillRect(0,0,100,110);
    // simple ground
    ctx.fillStyle="#92400e";ctx.fillRect(20,88,60,4);
    drawPlayer(ctx,50,80,"down",false,0,gender);
  },[gender]);
  function submit(){
    const n=name.trim();
    if(!n){setErr("Bitte einen Namen eingeben!");return;}
    onDone(n,gender);
  }
  return(
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 50% 70%,#062040,#020c18)",padding:20,gap:14}}>
      <div style={{color:"#38bdf8",fontSize:"clamp(9px,2vw,16px)",textShadow:"0 0 20px #0284c7",marginBottom:4}}>CHARAKTER ERSTELLEN</div>
      <canvas ref={canvasRef} style={{border:"1px solid #1e5a8a",borderRadius:6,imageRendering:"pixelated"}}/>
      <div style={{display:"flex",gap:8}}>
        {["m","f"].map(g=>(
          <button key={g} onClick={()=>setGender(g)} style={{background:gender===g?"#062040":"#020c18",border:`2px solid ${gender===g?(g==="f"?"#f472b6":"#38bdf8"):"#1e3a5a"}`,color:gender===g?(g==="f"?"#f9a8d4":"#38bdf8"):"#334155",fontFamily:"'Press Start 2P',monospace",fontSize:"clamp(6px,1.1vw,9px)",padding:"8px 14px",cursor:"pointer",borderRadius:4}}>
            {g==="m"?"♂ MÄNNLICH":"♀ WEIBLICH"}
          </button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
        <div style={{color:"#475569",fontSize:"clamp(5px,.9vw,8px)"}}>DEIN NAME (max 12 Zeichen)</div>
        <input value={name} onChange={e=>setName(e.target.value.slice(0,12))} onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder="z.B. Marina" maxLength={12} autoFocus
          style={{background:"#041624",border:"2px solid #1e5a8a",color:"#e0f2fe",fontFamily:"'Press Start 2P',monospace",fontSize:"clamp(9px,1.8vw,14px)",padding:"10px 16px",outline:"none",width:220,textAlign:"center",borderRadius:2}}/>
        {err&&<div style={{color:"#f87171",fontSize:"clamp(5px,.8vw,7px)"}}>{err}</div>}
      </div>
      <button onClick={submit} style={{background:"#062040",border:"2px solid #38bdf8",color:"#38bdf8",fontFamily:"'Press Start 2P',monospace",fontSize:"clamp(8px,1.4vw,11px)",padding:"12px 28px",cursor:"pointer",boxShadow:"0 0 20px #0284c750",marginTop:4}}>
        ▶ ABENTEUER STARTEN
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════ OVERWORLD ═══ */
function OverworldScreen({player,onEnterTown,onWild,onMenu,canEnter,onWalox}){
  const canvasRef=useRef(null);
  const posRef=useRef({...OW.pos});
  const facingRef=useRef(OW.facing);
  const keysRef=useRef({});
  const stepRef=useRef(0);
  const lastTRef=useRef({x:Math.floor(OW.pos.x/TS),y:Math.floor(OW.pos.y/TS)});
  const rafRef=useRef(null);
  const [,redraw]=useState(0);
  const [msg,setMsg]=useState("");
  const msgTRef=useRef(null);
  const genderRef=useRef(player.gender);

  function showMsg(txt){setMsg(txt);clearTimeout(msgTRef.current);msgTRef.current=setTimeout(()=>setMsg(""),2200);}
  useEffect(()=>{
    const dn=e=>{keysRef.current[e.key]=true;["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)&&e.preventDefault();};
    const up=e=>{keysRef.current[e.key]=false;};
    window.addEventListener("keydown",dn);window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up);};
  },[]);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;
    const ctx=canvas.getContext("2d");
    ctx.imageSmoothingEnabled=false;
    let frame=0;const SPEED=2.4;
    const loop=()=>{
      frame++;
      const k=keysRef.current;
      let dx=0,dy=0;
      if(k["ArrowLeft"]||k["a"]||k["A"]){dx=-SPEED;facingRef.current="left";}
      if(k["ArrowRight"]||k["d"]||k["D"]){dx=SPEED;facingRef.current="right";}
      if(k["ArrowUp"]||k["w"]||k["W"]){dy=-SPEED;facingRef.current="up";}
      if(k["ArrowDown"]||k["s"]||k["S"]){dy=SPEED;facingRef.current="down";}
      if(dx&&dy){dx*=.707;dy*=.707;}
      const moving=!!(dx||dy);
      if(moving){
        const nx=posRef.current.x+dx,ny=posRef.current.y+dy;
        const corners=[[nx-9,ny-5],[nx+9,ny-5],[nx-9,ny+9],[nx+9,ny+9]];
        const ok=corners.every(([cx,cy])=>{const tx=Math.floor(cx/TS),ty=Math.floor(cy/TS);const t2=THE_MAP[ty]?.[tx];return t2!==undefined&&t2!==T_TREE&&t2!==T_WATER&&t2!==T_HOUSE;});
        if(ok){
          posRef.current={x:nx,y:ny};OW.pos={...posRef.current};OW.facing=facingRef.current;
          const tx=Math.floor(nx/TS),ty=Math.floor(ny/TS);
          const last=lastTRef.current;
          if(tx!==last.x||ty!==last.y){
            lastTRef.current={x:tx,y:ty};
            const tile=THE_MAP[ty]?.[tx];
            if(tile===T_GRASS){stepRef.current++;if(stepRef.current>6&&Math.random()<0.22){stepRef.current=0;let pool;if(tx<22){pool=ty<18?["karpfi","forellius"]:["karpfi","barschi"];}else if(tx<36){pool=ty<18?["hechtus","forellius"]:["barschi","karpfi"];}else if(tx<48){pool=ty<18?["hechtus","zanderan"]:["hechtus","forellius"];}else{pool=ty<20?["zanderan","hechtus"]:["welsio","zanderan"];}cancelAnimationFrame(rafRef.current);onWild(pool[Math.floor(Math.random()*pool.length)]);return;}}else{stepRef.current=0;}
            if(tile>=5&&tile<=9){const ids=["konstanz","ueberling","fhafen","lindau","bregenz"];const city=CITIES.find(c=>c.id===ids[tile-5]);if(city){const reason=canEnter?canEnter(city):null;if(reason){lastTRef.current={x:tx,y:ty};showMsg(reason,2600);}else{cancelAnimationFrame(rafRef.current);showMsg(`→ ${city.name}`);setTimeout(()=>onEnterTown(city),350);return;}}}
            if(tile===T_WALOX){
              if(!player.waloxUnlocked){showMsg("Die Mitte des Sees liegt still da...");}
              else if(!dexComplete(player)){showMsg("Etwas Gewaltiges regt sich in der Tiefe! Vollende erst den Aquariumdex.",2800);}
              else{cancelAnimationFrame(rafRef.current);showMsg("⭐ WALOX erhebt sich!");setTimeout(()=>onWalox(),550);return;}
            }
          }
        }
      }
      const W=canvas.width,H=canvas.height;
      ctx.fillStyle="#020c18";ctx.fillRect(0,0,W,H);
      const camX=Math.max(0,Math.min(posRef.current.x-W/2,(MAP_W-1)*TS-W));
      const camY=Math.max(0,Math.min(posRef.current.y-H/2,(MAP_H-1)*TS-H));
      const sx=Math.floor(camX/TS),sy=Math.floor(camY/TS),ex=Math.ceil((camX+W)/TS)+1,ey=Math.ceil((camY+H)/TS)+1;
      for(let ty2=sy;ty2<ey;ty2++)for(let tx2=sx;tx2<ex;tx2++){if(ty2<0||ty2>=MAP_H||tx2<0||tx2>=MAP_W)continue;drawTile(ctx,THE_MAP[ty2]?.[tx2]??0,tx2*TS-camX,ty2*TS-camY,TS,frame,tx2,ty2);}
      CITIES.forEach(c=>{const beaten=player.beaten?.includes(c.id);const lx=c.x*TS-camX+TS/2,ly=c.y*TS-camY-6;if(lx>-40&&lx<W+40&&ly>-20&&ly<H+20){ctx.fillStyle=beaten?"rgba(0,230,118,.85)":"rgba(251,191,36,.85)";ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText(c.name+(beaten?" ✓":""),lx,ly);}});
      if(player.waloxUnlocked){const wsx=WALOX_TILE.x*TS-camX+TS/2,wsy=(WALOX_TILE.y-2)*TS-camY+TS/2;if(wsx>-60&&wsx<W+60&&wsy>-60&&wsy<H+60)drawWaloxOnMap(ctx,wsx,wsy,frame);}
      drawPlayer(ctx,posRef.current.x-camX,posRef.current.y-camY,facingRef.current,moving,frame,genderRef.current);
      // Minimap
      const mm=48,mms=mm/Math.max(MAP_W,MAP_H),mmx=W-mm-8,mmy=8;
      ctx.fillStyle="rgba(2,12,24,.75)";ctx.fillRect(mmx-2,mmy-2,mm+4,mm+4);
      ctx.strokeStyle="#1e5a8a";ctx.lineWidth=1;ctx.strokeRect(mmx-2,mmy-2,mm+4,mm+4);
      for(let ty2=0;ty2<MAP_H;ty2++)for(let tx2=0;tx2<MAP_W;tx2++){const t2=THE_MAP[ty2][tx2];ctx.fillStyle=t2===T_WATER?"#0e4a7a":t2===T_TREE?"#0d2008":t2>=5&&t2<=9?"#fbbf24":t2===T_HOUSE?"#374151":t2===T_PATH?"#92400e":t2===T_SAND?"#ca8a04":t2===T_OWPIER?"#78350f":t2===T_WALOX?"#22d3ee":"#166534";ctx.fillRect(mmx+tx2*mms,mmy+ty2*mms,Math.ceil(mms),Math.ceil(mms));}
      ctx.fillStyle="#f87171";ctx.beginPath();ctx.arc(mmx+Math.floor(posRef.current.x/TS)*mms+mms/2,mmy+Math.floor(posRef.current.y/TS)*mms+mms/2,2,0,Math.PI*2);ctx.fill();
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(rafRef.current);
  },[]);
  const K=k=>v=>{keysRef.current[k]=v;};
  const dBtn=(k,lbl)=>(<button onTouchStart={e=>{e.preventDefault();K(k)(true);}} onTouchEnd={e=>{e.preventDefault();K(k)(false);}} onMouseDown={()=>K(k)(true)} onMouseUp={()=>K(k)(false)} onMouseLeave={()=>K(k)(false)} style={{width:46,height:46,background:"rgba(2,12,24,.82)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:20,borderRadius:8,cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none",WebkitTapHighlightColor:"transparent",touchAction:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>{lbl}</button>);
  return(
    <div style={{width:"100%",height:"100%",position:"relative",overflow:"hidden",background:"#020c18"}}>
      <canvas ref={canvasRef} style={{display:"block",width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",top:8,left:8,background:"rgba(2,12,24,.85)",border:"1px solid #0e2a4a",padding:"5px 8px",borderRadius:4,display:"flex",gap:4,alignItems:"center"}}>
        <span style={{color:player.gender==="f"?"#f9a8d4":"#93c5fd",fontSize:"clamp(5px,.9vw,7px)",marginRight:2}}>{player.name}</span>
        {player.team.map((m,i)=>(<div key={i} style={{filter:`drop-shadow(0 0 3px ${m.color})`}}><MonSprite monKey={m.key} size={20}/></div>))}
      </div>
      <button onClick={onMenu} style={{position:"absolute",top:8,right:62,background:"rgba(2,12,24,.85)",border:"1px solid #1e5a8a",color:"#38bdf8",fontSize:"clamp(5px,1vw,8px)",fontFamily:"inherit",padding:"5px 8px",cursor:"pointer",borderRadius:4}}>📋 MENÜ</button>
      {msg&&<div style={{position:"absolute",top:"40%",left:"50%",transform:"translateX(-50%)",background:"rgba(2,12,24,.92)",border:"1px solid #1e5a8a",padding:"8px 16px",color:"#e0f2fe",fontSize:"clamp(6px,1.2vw,10px)",fontFamily:"'Press Start 2P',monospace",whiteSpace:"nowrap",borderRadius:4}}>{msg}</div>}
      <div style={{position:"absolute",bottom:"calc(env(safe-area-inset-bottom, 0px) + 18px)",left:16,display:"grid",gridTemplateColumns:"46px 46px 46px",gridTemplateRows:"46px 46px 46px",gap:3,touchAction:"none",WebkitUserSelect:"none",userSelect:"none",WebkitTouchCallout:"none"}}>
        <div/>{dBtn("ArrowUp","↑")}<div/>
        {dBtn("ArrowLeft","←")}<div/>{dBtn("ArrowRight","→")}
        <div/>{dBtn("ArrowDown","↓")}<div/>
      </div>
    </div>
  );
}

function CityInterior({city,player,beaten,onArena,onCenter,onFish,onExit,onMenu,onSwitch}){

  const genderRef=useRef(player.gender);

  const switchedRef=useRef(false);

  const FH_SWITCH={x:16,y:11}; // Moleturm-Schalter

  function showMsg(txt,ms=2200){setMsg(txt);clearTimeout(msgTRef.current);msgTRef.current=setTimeout(()=>setMsg(""),ms);}

  useEffect(()=>{
    const dn=e=>{keysRef.current[e.key]=true;["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)&&e.preventDefault();};
    const up=e=>{keysRef.current[e.key]=false;};
    window.addEventListener("keydown",dn);window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up);};
  },[]);

    const canvas=canvasRef.current;if(!canvas)return;

        if(k["ArrowUp"]||k["w"]||k["W"]){dy=-SPEED;facingRef.current="up";}

        if(dx&&dy){dx*=.707;dy*=.707;}
      }
      const moving=!!(dx||dy);
      if(moving){
        const nx=posRef.current.x+dx,ny=posRef.current.y+dy;
        const corners=[[nx-9,ny-5],[nx+9,ny-5],[nx-9,ny+9],[nx+9,ny+9]];
        const ok=corners.every(([cx,cy])=>{const tx=Math.floor(cx/KTS),ty=Math.floor(cy/KTS);const t2=KMAP[ty]?.[tx];return t2!==undefined&&t2!==T_TREE&&t2!==T_HOUSE&&t2!==T_WATER;});

              lockRef.current=true;cancelAnimationFrame(rafRef.current);showMsg(`→ Verlasse ${city.name}...`);setTimeout(()=>onExit(),350);return;
            }else if(isFhafen&&tx===FH_SWITCH.x&&ty===FH_SWITCH.y&&!switchedRef.current){
              switchedRef.current=true;
              if(player.waloxUnlocked){showMsg("🔧 Der Moleturm-Schalter ist bereits umgelegt.",2600);}
              else{onSwitch&&onSwitch();showMsg("🔧 Versteckter Schalter am Moleturm aktiviert! In der Seemitte erwacht etwas Gewaltiges...",3400);}
            }
          }
        }
      }
      const W=canvas.width,H=canvas.height;
      ctx.fillStyle="#020c18";ctx.fillRect(0,0,W,H);
      const worldW=KW*KTS,worldH=KH*KTS;
      const camX=Math.max(0,Math.min(posRef.current.x-W/2,Math.max(0,worldW-W)));

      const sx=Math.floor(camX/KTS),sy=Math.floor(camY/KTS),ex=Math.ceil((camX+W)/KTS)+1,ey=Math.ceil((camY+H)/KTS)+1;

      }
      drawPlayer(ctx,posRef.current.x-camX,posRef.current.y-camY,facingRef.current,moving,frame,genderRef.current);
      rafRef.current=requestAnimationFrame(loop);

/* ═══════════════════════════════════════════════════ FISHING ═══ */
function FishingScreen({city,baitBonus=0,onCaught,onBack}){
  const [phase,setPhase]=useState("idle");const [pos,setPos]=useState(50);const [hits,setHits]=useState(0);const [misses,setMisses]=useState(0);const [caught,setCaught]=useState(null);const [msg,setMsg]=useState("Wirf die Angel aus!");
  const [round,setRound]=useState(0); // bumped every time reeling (re)starts so the effect re-fires even if phase stays "reeling"
  const [zoneS]=useState(()=>18+Math.random()*30);const [zoneW]=useState(()=>18+Math.random()*10+baitBonus*0.35);
  const rafRef=useRef(null);const posRef=useRef(50);const dirRef=useRef(1);const spdRef=useRef(1.4);const zoneE=Math.min(92,zoneS+zoneW);
  function startReeling(){posRef.current=50;setPos(50);setPhase("reeling");setRound(r=>r+1);}
  useEffect(()=>{if(phase!=="reeling")return;const tick=()=>{posRef.current+=spdRef.current*dirRef.current;if(posRef.current>=100){posRef.current=100;dirRef.current=-1;}if(posRef.current<=0){posRef.current=0;dirRef.current=1;}setPos(posRef.current);rafRef.current=requestAnimationFrame(tick);};rafRef.current=requestAnimationFrame(tick);return()=>cancelAnimationFrame(rafRef.current);},[phase,round]);
  function cast(){spdRef.current=1.2+Math.random()*.9;dirRef.current=1;setHits(0);setMisses(0);setPhase("casting");setMsg("Ein Fisch nähert sich...");setTimeout(()=>{startReeling();setMsg("Klicke wenn Zeiger im GRÜNEN Bereich ist!");},1400);}
  function pull(){if(phase!=="reeling")return;cancelAnimationFrame(rafRef.current);const inZ=pos>=zoneS&&pos<=zoneE;if(inZ){const nh=hits+1;setHits(nh);if(nh>=2){const key=city.wild[Math.floor(Math.random()*city.wild.length)];setCaught(key);setPhase("result");setMsg(`${MONS[key].name} gefangen!`);}else{setMsg("✅ Treffer! Nochmal!");spdRef.current+=.4;dirRef.current=1;setTimeout(()=>startReeling(),500);}}else{const nm=misses+1;setMisses(nm);spdRef.current+=.3;dirRef.current=1;if(nm>=3){setPhase("result");setMsg("❌ Der Fisch entkam...");}else{setMsg(`❌ Daneben! Noch ${3-nm}.`);setTimeout(()=>startReeling(),600);}}}
  return(
    <div style={{width:"100%",height:"100%",background:"linear-gradient(180deg,#020c18,#041a2e 60%,#031220)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",gap:"14px"}}>
      <div style={{color:"#38bdf8",fontSize:"clamp(8px,1.5vw,12px)"}}>🎣 ANGELN — {city.name.toUpperCase()}</div>
      {baitBonus>0&&<div style={{color:"#a3e635",fontSize:"clamp(4px,.8vw,7px)"}}>🪝 Köder aktiv: +{Math.round(baitBonus*0.35)}% Fangzone</div>}
      <div style={{color:"#7dd3fc",fontSize:"clamp(6px,1.2vw,10px)",textAlign:"center",minHeight:"22px"}}>{msg}</div>
      {(phase==="reeling"||phase==="casting")&&<div onClick={phase==="reeling"?pull:undefined} style={{width:"min(92%,380px)",cursor:phase==="reeling"?"pointer":"default"}}>
        <div style={{width:"100%",height:30,background:"#020c18",border:"1px solid #0e4a7a",borderRadius:4,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,bottom:0,left:`${zoneS}%`,width:`${zoneE-zoneS}%`,background:"rgba(0,230,118,.22)",borderLeft:"2px solid #00e676",borderRight:"2px solid #00e676"}}/>
          <div style={{position:"absolute",top:3,bottom:3,width:6,marginLeft:-3,left:`${pos}%`,background:"#fbbf24",borderRadius:2,boxShadow:"0 0 8px #f59e0b"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3,color:"#334155",fontSize:"clamp(4px,.7vw,7px)"}}><span>Treffer:{hits}/2</span><span>Versuche:{misses}/3</span></div>
      </div>}
      {phase==="idle"&&<button onClick={cast} style={{...G("#041a0c","#4ade80",{padding:"12px 24px",fontSize:"clamp(8px,1.5vw,11px)"})}}>🎣 Angel auswerfen</button>}
      {phase==="reeling"&&<button onClick={pull} style={{...G("#041a10","#00e676",{padding:"12px 24px",fontSize:"clamp(8px,1.5vw,11px)",boxShadow:"0 0 12px #00e67640"})}}>⚡ JETZT ZIEHEN!</button>}
      {phase==="result"&&caught&&<div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><div style={{filter:`drop-shadow(0 0 20px ${MONS[caught].color})`,animation:"monIdle 1.5s ease-in-out infinite alternate"}}><MonSprite monKey={caught} size={110}/></div><div style={{color:"#4ade80",fontSize:"clamp(8px,1.5vw,12px)"}}>{MONS[caught].name} gefangen!</div><button onClick={()=>onCaught(caught)} style={{...G("#041a0c","#4ade80"),marginTop:6}}>→ Zum Team</button></div>}
      {phase==="result"&&!caught&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}><div style={{fontSize:"3rem"}}>🌊</div><button onClick={()=>setPhase("idle")} style={G("#041624","#38bdf8")}>↺ Nochmal</button></div>}
      {phase!=="result"&&<button onClick={onBack} style={{...G("#0a0a14","#334155"),marginTop:"auto"}}>← Zurück</button>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════ BATTLE ═══ */
const mkMon=k=>({...MONS[k],key:k,hp:MONS[k].maxHp,atkMod:0,defMod:0});
const calcDmg=(a,d,mv)=>{const p=MOVES[mv]?.p||0;if(!p)return 0;const atk=a.atk*(1+(a.atkMod||0)*.3);const def=d.def*(1+(d.defMod||0)*.3);return Math.max(1,Math.floor(atk/def*p*(.85+Math.random()*.15)));};
const hpCol=p=>p>60?"#00e676":p>30?"#ffb300":"#ff1744";

function BattleScreen({data,player,onWin,onLose}){
  const bref=useRef({pTeam:player.team.map(m=>({...m})),eTeam:data.enemies.map(m=>({...m})),pIdx:0,eIdx:0,log:[data.isTrainer?`${data.trainerName} fordert heraus!`:`Wilder ${data.enemies[0].name} erscheint!`],shakeP:false,shakeE:false,phase:"player"});
  const [,rr]=useState(0);const tick=()=>rr(n=>n+1);
  const [anim,setAnim]=useState(null); // {side,phase,moveName,dmg,color,isBuff}
  const [showSwitch,setShowSwitch]=useState(false);
  const busy=useRef(false);
  const bs=bref.current;const pm=bs.pTeam[bs.pIdx];const em=bs.eTeam[bs.eIdx];
  const addLog=m=>{bs.log=[...bs.log.slice(-4),m];tick();};
  function shake(w){bs[w==="p"?"shakeP":"shakeE"]=true;tick();setTimeout(()=>{bs[w==="p"?"shakeP":"shakeE"]=false;tick();},360);}

  function triggerAnim(cfg){
    setAnim({...cfg,phase:1});
    setTimeout(()=>setAnim(a=>a?{...a,phase:2}:null),300);
    setTimeout(()=>setAnim(null),750);
  }

  function enemyTurn(){
    const ce=bs.eTeam[bs.eIdx];const cp=bs.pTeam[bs.pIdx];
    const atks=ce.moves.filter(mv=>MOVES[mv]?.p>0);
    const mv=atks[Math.floor(Math.random()*atks.length)]||ce.moves[0];
    const dmg=calcDmg(ce,cp,mv);
    triggerAnim({side:"e",moveName:mv,dmg,color:ce.color,isBuff:false});
    addLog(`${ce.name} → ${mv}: ${dmg} Schaden!`);
    shake("p");
    const nHp=Math.max(0,cp.hp-dmg);
    setTimeout(()=>{bs.pTeam[bs.pIdx]={...cp,hp:nHp};tick();setTimeout(()=>{if(nHp<=0){addLog(`${cp.name} besiegt!`);const npi=bs.pIdx+1;if(npi<bs.pTeam.length){bs.pIdx=npi;addLog(`${bs.pTeam[npi].name} weiter!`);busy.current=false;tick();}else{bs.phase="ended";tick();setTimeout(()=>onLose(),900);}}else{busy.current=false;tick();}},300);},350);
  }

  function useMove(mv){
    if(busy.current||bs.phase!=="player")return;
    busy.current=true;
    const move=MOVES[mv];const cp=bs.pTeam[bs.pIdx];const ce=bs.eTeam[bs.eIdx];
    if(move.buff){
      triggerAnim({side:"p",moveName:mv,dmg:0,color:cp.color,isBuff:true});
      const k=`${move.buff}Mod`;bs.pTeam[bs.pIdx]={...cp,[k]:(cp[k]||0)+1};
      addLog(`${cp.name}: ${mv}! ↑`);
      setTimeout(()=>enemyTurn(),700);return;
    }
    const dmg=calcDmg(cp,ce,mv);
    triggerAnim({side:"p",moveName:mv,dmg,color:cp.color,isBuff:false});
    addLog(`${cp.name} → ${mv}: ${dmg} Schaden!`);
    shake("e");
    const nEHp=Math.max(0,ce.hp-dmg);
    setTimeout(()=>{bs.eTeam[bs.eIdx]={...ce,hp:nEHp};tick();setTimeout(()=>{if(nEHp<=0){addLog(`${ce.name} besiegt! ✓`);const nei=bs.eIdx+1;if(nei<bs.eTeam.length){bs.eIdx=nei;addLog(`${bs.eTeam[nei].name} tritt an!`);busy.current=false;tick();}else{bs.phase="ended";tick();setTimeout(()=>onWin(data.cityId,data.finale||false,null),900);}}else{setTimeout(()=>enemyTurn(),320);}},200);},380);
  }

  function tryCatch(){
    if(busy.current||data.isTrainer||bs.phase!=="player")return;
    busy.current=true;
    const ce=bs.eTeam[bs.eIdx];
    const baitBonus=(player.baits||[]).reduce((s,bk)=>s+(BAITS[bk]?.bonus||0),0);
    const chance=ce.catch*(1.5-(ce.hp/ce.maxHp)*.8)+baitBonus;
    addLog(`Angelrute ausgeworfen... 🎣`);tick();
    setTimeout(()=>{if(Math.random()*100<chance){addLog(`${ce.name} gefangen! 🎉`);bs.phase="ended";tick();setTimeout(()=>onWin(data.cityId,false,{...ce}),1000);}else{addLog(`${ce.name} entkam!`);setTimeout(()=>enemyTurn(),350);}},1100);
  }

  function doSwitch(idx){
    if(busy.current||bs.phase!=="player")return;
    if(idx===bs.pIdx||bs.pTeam[idx].hp<=0)return;
    busy.current=true;setShowSwitch(false);
    bs.pIdx=idx;addLog(`${bs.pTeam[idx].name} kommt in den Kampf!`);tick();
    setTimeout(()=>enemyTurn(),700);
  }
  const aliveCount=bref.current.pTeam.filter(m=>m.hp>0).length;

  const hpP=m=>Math.round(m.hp/m.maxHp*100);const dis=busy.current||bs.phase!=="player";

  return(
    <div style={{width:"100%",height:"100%",background:"#020c18",display:"flex",flexDirection:"column",padding:"8px",gap:"6px",position:"relative",overflow:"hidden"}}>
      {/* CSS for animations */}
      <style>{`
        @keyframes monIdle{from{transform:translateY(0)}to{transform:translateY(-5px)}}
        @keyframes floatDmg{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-48px);opacity:0}}
        @keyframes atkBounce{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-4deg)}100%{transform:scale(1) rotate(0deg)}}
        @keyframes hitFlash{0%{opacity:.75}100%{opacity:0}}
        @keyframes slideInR{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideInL{from{transform:translateX(-28px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slashFade{0%{opacity:1;scaleX:.2}100%{opacity:0;scaleX:1}}
        @keyframes buffSpark{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.8}100%{transform:scale(1);opacity:0}}
      `}</style>

      {/* Enemy area */}
      <div style={{flex:"0 0 30%",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:12,background:"#031020",border:"1px solid #0e1e30",padding:"8px 14px",borderRadius:4,position:"relative",overflow:"hidden"}}>
        {/* Enemy hit flash overlay */}
        {anim?.side==="p"&&anim?.phase===2&&<div style={{position:"absolute",inset:0,background:"white",opacity:.35,animation:"hitFlash .35s ease-out forwards",pointerEvents:"none",zIndex:2}}/>}
        {/* Slash effect (player attacks) */}
        {anim?.side==="p"&&anim?.phase===1&&!anim?.isBuff&&<div style={{position:"absolute",top:"30%",left:"10%",width:"65%",height:5,background:`linear-gradient(90deg,transparent,${anim.color},white)`,transform:"rotate(-18deg)",borderRadius:3,boxShadow:`0 0 10px ${anim.color}`,animation:"slashFade .35s ease-out forwards",zIndex:3}}/>}
        {/* Damage number over enemy */}
        {anim?.side==="p"&&anim?.phase===2&&anim?.dmg>0&&<div style={{position:"absolute",top:"10%",right:"12%",color:"white",fontSize:"clamp(14px,3vw,24px)",fontWeight:"bold",textShadow:`0 2px 6px #000,0 0 14px ${em.color}`,animation:"floatDmg .75s ease-out forwards",zIndex:4,pointerEvents:"none"}}>-{anim.dmg}</div>}
        {/* Enemy sprite */}
        <div style={{textAlign:"right"}}>
          {data.isTrainer&&<div style={{color:"#f87171",fontSize:"clamp(5px,.8vw,7px)",marginBottom:3}}>⚔️ {data.trainerName}</div>}
          <div style={{color:em.color,fontSize:"clamp(6px,1.2vw,10px)"}}>{em.name}</div>
          <div style={{color:"#334155",fontSize:"clamp(5px,.8vw,7px)"}}>[{em.type}] 🎣{em.catch}%</div>
          <div style={{width:110,height:7,background:"#0e1a2a",borderRadius:4,margin:"4px 0 2px",overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(em)}%`,background:hpCol(hpP(em)),transition:"width .35s"}}/></div>
          <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,7px)"}}>{em.hp}/{em.maxHp} HP</div>
        </div>
        <div style={{transform:bs.shakeE?"translateX(14px)":"none",transition:"transform .08s",filter:`drop-shadow(0 0 12px ${em.color}70)`,animation:anim?.side==="p"&&anim?.phase===1&&!anim?.isBuff?"atkBounce .35s ease-out":"monIdle 2s ease-in-out infinite alternate"}}>
          <MonSprite monKey={em.key} size={Math.min(100,Math.max(60,typeof window!=="undefined"?window.innerWidth/10:80))} flip idle={!(anim?.side==="p"&&anim?.phase===1)}/>
        </div>
      </div>

      {/* Move name banner */}
      {anim?.phase===1&&<div style={{position:"absolute",top:"28%",left:"50%",transform:"translateX(-50%)",color:anim.color,fontSize:"clamp(7px,1.4vw,11px)",textShadow:`0 0 12px ${anim.color},0 0 24px ${anim.color}`,background:"rgba(2,12,24,.88)",padding:"5px 12px",border:`1px solid ${anim.color}40`,borderRadius:3,animation:anim.side==="p"?"slideInR .25s ease-out":"slideInL .25s ease-out",zIndex:10,whiteSpace:"nowrap"}}>
        {anim.isBuff?"✨":anim.side==="p"?"⚡→":"←⚡"} {anim.moveName}
      </div>}

      {/* Player area */}
      <div style={{flex:"0 0 22%",display:"flex",alignItems:"center",gap:12,background:"#031020",border:"1px solid #0e1e30",padding:"8px 14px",borderRadius:4,position:"relative",overflow:"hidden"}}>
        {/* Player hit flash */}
        {anim?.side==="e"&&anim?.phase===2&&<div style={{position:"absolute",inset:0,background:"white",opacity:.3,animation:"hitFlash .35s ease-out forwards",pointerEvents:"none",zIndex:2}}/>}
        {/* Enemy slash effect */}
        {anim?.side==="e"&&anim?.phase===1&&<div style={{position:"absolute",top:"25%",right:"10%",width:"55%",height:5,background:`linear-gradient(270deg,transparent,${anim.color},white)`,transform:"rotate(18deg)",borderRadius:3,boxShadow:`0 0 10px ${anim.color}`,animation:"slashFade .35s ease-out forwards",zIndex:3}}/>}
        {/* Damage number over player */}
        {anim?.side==="e"&&anim?.phase===2&&anim?.dmg>0&&<div style={{position:"absolute",top:"8%",left:"12%",color:"white",fontSize:"clamp(14px,3vw,24px)",fontWeight:"bold",textShadow:`0 2px 6px #000,0 0 14px ${pm.color}`,animation:"floatDmg .75s ease-out forwards",zIndex:4,pointerEvents:"none"}}>-{anim.dmg}</div>}
        {/* Buff sparkle */}
        {anim?.side==="p"&&anim?.phase===1&&anim?.isBuff&&<div style={{position:"absolute",top:"10%",left:"30%",fontSize:"clamp(16px,3vw,26px)",animation:"buffSpark .5s ease-out forwards",zIndex:4}}>✨</div>}
        <div style={{transform:`${bs.shakeP?"translateX(-14px)":"none"} ${anim?.side==="e"&&anim?.phase===1?"rotate(2deg)":""}`,transition:"transform .08s",filter:`drop-shadow(0 0 10px ${pm.color}70)`,animation:"monIdle 2.4s ease-in-out infinite alternate"}}>
          <MonSprite monKey={pm.key} size={Math.min(85,Math.max(50,typeof window!=="undefined"?window.innerWidth/12:70))} idle/>
        </div>
        <div style={{flex:1}}>
          <div style={{color:pm.color,fontSize:"clamp(6px,1.2vw,10px)"}}>{pm.name}</div>
          <div style={{color:"#334155",fontSize:"clamp(5px,.8vw,7px)"}}>[{pm.type}]</div>
          <div style={{width:110,height:7,background:"#0e1a2a",borderRadius:4,margin:"4px 0 2px",overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(pm)}%`,background:hpCol(hpP(pm)),transition:"width .35s"}}/></div>
          <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,7px)"}}>{pm.hp}/{pm.maxHp} HP</div>
        </div>
        <div style={{textAlign:"center"}}><div style={{color:"#334155",fontSize:"clamp(4px,.6vw,6px)",marginBottom:3}}>Team</div><div style={{display:"flex",gap:2}}>{bs.pTeam.map((m,i)=><div key={i} style={{opacity:i===bs.pIdx?1:.28,filter:`drop-shadow(0 0 3px ${m.color})`}}><MonSprite monKey={m.key} size={18}/></div>)}</div></div>
      </div>

      <div style={{background:"#020e1a",border:"1px solid #0e2a4a",padding:"7px 10px",minHeight:46}}>
        {bs.log.slice(-2).map((l,i,arr)=><div key={i} style={{color:i===arr.length-1?"#e0f2fe":"#334155",fontSize:"clamp(6px,1vw,9px)",lineHeight:1.7}}>{l}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        {pm.moves.map(mv=>(<button key={mv} onClick={()=>useMove(mv)} disabled={dis} style={{...G(MOVES[mv]?.buff?"#0d0a20":"#020a1a",MOVES[mv]?.buff?"#c084fc":"#38bdf8"),opacity:dis?.38:1}}>{MOVES[mv]?.buff?"✨":"⚡"} {mv}{MOVES[mv]?.p>0&&` (${MOVES[mv].p})`}</button>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:data.isTrainer?"1fr":"1fr 1fr",gap:5}}>
        {aliveCount>1&&<button onClick={()=>setShowSwitch(true)} disabled={dis} style={{...G("#0a1420","#7dd3fc",{textAlign:"center"}),opacity:dis?.38:1}}>🔄 Wechseln</button>}
        {!data.isTrainer&&<button onClick={tryCatch} disabled={dis} style={{...G("#041a0c","#4ade80",{textAlign:"center"}),opacity:dis?.38:1}}>🎣 Fangen</button>}
      </div>

      {showSwitch&&<div style={{position:"absolute",inset:0,background:"rgba(2,12,24,.94)",zIndex:30,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:16}}>
        <div style={{color:"#7dd3fc",fontSize:"clamp(7px,1.4vw,11px)"}}>🔄 AQUARIUMMON WECHSELN</div>
        <div style={{color:"#475569",fontSize:"clamp(4px,.8vw,7px)",textAlign:"center",marginBottom:4}}>Wechseln kostet einen Zug — der Gegner greift danach an.</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",maxWidth:340}}>
          {bs.pTeam.map((m,i)=>{
            const fainted=m.hp<=0,active=i===bs.pIdx,canPick=!fainted&&!active;
            return(
              <button key={i} onClick={()=>canPick&&doSwitch(i)} disabled={!canPick}
                style={{display:"flex",alignItems:"center",gap:10,padding:8,background:active?"#062040":canPick?"#041624":"#0a0a14",border:`1px solid ${active?m.color:canPick?"#1e5a8a":"#1e293b"}`,borderRadius:5,cursor:canPick?"pointer":"default",opacity:fainted?.4:1,fontFamily:"inherit"}}>
                <div style={{filter:`drop-shadow(0 0 4px ${m.color})`}}><MonSprite monKey={m.key} size={32}/></div>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{color:m.color,fontSize:"clamp(5px,.9vw,8px)"}}>{m.name}{active?" (aktiv)":fainted?" (K.O.)":""}</div>
                  <div style={{width:90,height:5,background:"#0e1a2a",borderRadius:3,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",width:`${hpP(m)}%`,background:hpCol(hpP(m))}}/></div>
                  <div style={{color:"#475569",fontSize:"clamp(4px,.7vw,6px)",marginTop:2}}>{m.hp}/{m.maxHp} HP</div>
                </div>
                {canPick&&<span style={{color:"#7dd3fc",fontSize:"clamp(6px,1vw,9px)"}}>►</span>}
              </button>
            );
          })}
        </div>
        <button onClick={()=>setShowSwitch(false)} style={{...G("#0a0a14","#475569"),marginTop:6}}>← Abbrechen</button>
      </div>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════ GAMEOVER / CREDITS ═══ */
function GameOverScreen({onBack}){return(<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#020c18",gap:16}}><div style={{color:"#ef4444",fontSize:"clamp(14px,3vw,28px)"}}>GAME OVER</div><div style={{color:"#64748b",fontSize:"clamp(6px,1vw,9px)"}}>Deine Aquariummon erschöpft...</div><button onClick={onBack} style={{...G("#041624","#38bdf8"),marginTop:8}}>→ Weiter</button></div>);}
function CreditsScreen({onRestart}){return(<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(#041a2e,#020c18)",gap:12,padding:24,textAlign:"center"}}><div style={{fontSize:"3rem"}}>🏆</div><div style={{color:"#fbbf24",fontSize:"clamp(10px,2vw,18px)"}}>TEAM ANGLER BESIEGT!</div><div style={{color:"#7dd3fc",fontSize:"clamp(6px,1.2vw,10px)",lineHeight:2.2}}>Dr. Haken ist Geschichte — der Bodensee ist gerettet!</div><div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginTop:8}}>{BASE_KEYS.map((k,i)=><div key={k} style={{filter:`drop-shadow(0 0 8px ${MONS[k].color})`,animation:"monIdle 2s ease-in-out infinite alternate",animationDelay:`${i*.3}s`}}><MonSprite monKey={k} size={44}/></div>)}</div><div style={{color:"#22d3ee",fontSize:"clamp(6px,1.1vw,9px)",lineHeight:1.9,marginTop:6,maxWidth:380}}>🌊 Doch in der Mitte des Sees regt sich etwas Gewaltiges... Ein legendärer Schatten ist erwacht!</div><div style={{color:"#475569",fontSize:"clamp(4px,.8vw,7px)",lineHeight:1.7}}>Vollende den Aquariumdex und gehe zum Steg in der Seemitte.</div><button onClick={onRestart} style={{...G("#041624","#38bdf8"),marginTop:12}}>→ Weiter erkunden</button></div>);}
function LegendScreen({onRestart}){return(<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 50% 45%,#06303a,#020c18)",gap:14,padding:24,textAlign:"center",position:"relative",overflow:"hidden"}}><div style={{filter:"drop-shadow(0 0 24px #22d3ee)",animation:"monIdle 2.4s ease-in-out infinite alternate"}}><MonSprite monKey="walox" size={140}/></div><div style={{color:"#22d3ee",fontSize:"clamp(12px,2.6vw,24px)",textShadow:"0 0 24px #0891b2"}}>WALOX BEZWUNGEN!</div><div style={{color:"#fde047",fontSize:"clamp(9px,1.8vw,15px)",textShadow:"0 0 16px #ca8a04"}}>🏅 DU BIST DER BESTE ANGLER<br/>AM BODENSEE!</div><div style={{color:"#7dd3fc",fontSize:"clamp(6px,1.2vw,10px)",lineHeight:2,maxWidth:420}}>Der legendäre Wal des Sees hat deine Stärke anerkannt. Dein Name wird am ganzen Bodensee in Ehren gehalten.</div><button onClick={onRestart} style={{...G("#041624","#22d3ee"),marginTop:10}}>↺ Neues Spiel</button></div>);}

/* ═══════════════════════════════════════════════════ APP ═══ */
function AquariumMon(){
  const [scr,setScr]=useState("title");
  const [player,setPlayer]=useState(null);
  const [dlg,setDlg]=useState(null);
  const [curCity,setCurCity]=useState(null);
  const [battle,setBattle]=useState(null);
  const [showMenu,setShowMenu]=useState(false);
  const [savedName,setSavedName]=useState(null);

  // Check for existing save on mount
  useEffect(()=>{loadSave().then(s=>{if(s)setSavedName(s.name);});},[]);

  // Auto-save when player changes
  useEffect(()=>{
    if(player&&scr!=="title"&&scr!=="character"){
      saveGame({...player,owX:OW.pos.x,owY:OW.pos.y,owFacing:OW.facing})
        .then(()=>setSavedName(player.name));
    }
  },[player]);

  const go=s=>setScr(s);
  function showDlg(events,cb){setDlg({events,idx:0,cb});go("dialogue");}
  function nextDlg(){const next=dlg.idx+1;if(next>=dlg.events.length){const cb=dlg.cb;setDlg(null);if(cb)cb();}else setDlg(d=>({...d,idx:next}));}

  function startNew(){OW.pos={x:18*TS+TS/2,y:27*TS+TS/2};OW.facing="left";go("character");}
  function onCharDone(name,gender){
    setPlayer({name,gender,team:[mkMon("karpfi")],caught:["karpfi"],seen:["karpfi"],beaten:[],baits:[],rods:5,waloxUnlocked:false});
    showDlg(DLGS[0],()=>go("overworld"));
  }
  async function loadGame(){
    const s=await loadSave();
    if(!s)return;
    if(s.owX){OW.pos={x:s.owX,y:s.owY};OW.facing=s.owFacing||"left";}
    // backfill new fields for old saves
    setPlayer({seen:s.caught?[...s.caught]:[],baits:[],waloxUnlocked:false,...s});go("overworld");
  }

  function enterTown(city){setCurCity(city);go("city");}
  function fightTrainer(city){setBattle({isTrainer:true,trainerName:city.boss.name,enemies:city.boss.mons.map(mkMon),cityId:city.id,finale:!!city.finale,bait:city.bait});DLGS[city.si]?showDlg(DLGS[city.si],()=>go("battle")):go("battle");}
  function centerHeal(){setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:m.maxHp}))}):p);}
  function exitCity(){if(curCity){OW.pos={x:curCity.ex*TS+TS/2,y:curCity.ey*TS+TS/2};OW.facing="down";}setCurCity(null);go("overworld");}
  function markSeen(monKey){setPlayer(p=>p&&!(p.seen||[]).includes(monKey)?({...p,seen:[...(p.seen||[]),monKey]}):p);}
  function owWild(monKey){markSeen(monKey);setBattle({isTrainer:false,enemies:[mkMon(monKey)],cityId:null,finale:false});go("battle");}
  // Geheimer Moleturm-Schalter in Friedrichshafen
  function unlockWalox(){setPlayer(p=>p?({...p,waloxUnlocked:true}):p);}
  // Legendären Walox-Kampf starten (nur erreichbar wenn Dex voll – Overworld prüft das)
  function startWalox(){
    showDlg([
      {spk:"???",ico:"🌊",txt:"Das Wasser der Seemitte beginnt zu brodeln..."},
      {spk:"Walox",ico:"🐳",txt:"Ein gewaltiger Schatten steigt empor — der legendäre Walox!"},
      {spk:(player?.name||"Du"),ico:"🎣",txt:"Als bester Angler nehme ich die Herausforderung an!"},
    ],()=>{setBattle({isTrainer:true,trainerName:"⭐ Legendär",enemies:[mkMon("walox")],cityId:null,finale:false,walox:true});go("battle");});
  }

  function onBattleWin(cityId,isFinale,caughtMon){
    if(caughtMon)setPlayer(p=>({...p,team:p.team.length<3?[...p.team,caughtMon]:p.team,caught:p.caught.includes(caughtMon.key)?p.caught:[...p.caught,caughtMon.key],seen:(p.seen||[]).includes(caughtMon.key)?p.seen:[...(p.seen||[]),caughtMon.key]}));
    if(cityId)setPlayer(p=>{
      const beaten=p.beaten.includes(cityId)?p.beaten:[...p.beaten,cityId];
      const bait=battle?.bait;
      const baits=bait&&!(p.baits||[]).includes(bait)?[...(p.baits||[]),bait]:(p.baits||[]);
      return{...p,beaten,baits};
    });
    setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:Math.min(m.maxHp,m.hp+Math.floor(m.maxHp*.3))}))}):p);
    // Legendären Walox bezwungen → bester Angler
    if(battle?.walox){setPlayer(p=>p?({...p,caught:p.caught.includes("walox")?p.caught:[...p.caught,"walox"],seen:(p.seen||[]).includes("walox")?p.seen:[...(p.seen||[]),"walox"]}):p);go("legend");return;}
    // Bregenz-Finale (Dr. Haken) besiegt → Team Angler erledigt + Walox erwacht im See
    if(isFinale){setPlayer(p=>p?({...p,waloxUnlocked:true}):p);go("bregenzwin");return;}
    if(curCity)go("city");else go("overworld");
  }
  function onFishCaught(k){const mon=mkMon(k);setPlayer(p=>({...p,team:p.team.length<3?[...p.team,mon]:p.team,caught:p.caught.includes(k)?p.caught:[...p.caught,k],seen:(p.seen||[]).includes(k)?p.seen:[...(p.seen||[]),k],rods:p.rods-1}));go("city");}
  function onGameOver(){setPlayer(p=>p?({...p,team:p.team.map(m=>({...m,hp:Math.floor(m.maxHp*.5)}))}):p);go(battle?.walox?"overworld":curCity?"city":"overworld");}
  async function doSave(){if(player)await saveGame({...player,owX:OW.pos.x,owY:OW.pos.y,owFacing:OW.facing});}
  // Nach Bregenz-Sieg zurück in die Welt, Spieler erscheint am Bregenz-Ausgang
  function continueAfterBregenz(){const b=CITIES.find(c=>c.id==="bregenz");if(b){OW.pos={x:b.ex*TS+TS/2,y:b.ey*TS+TS/2};OW.facing="down";}setCurCity(null);go("overworld");}

  const baitBonus=(player?.baits||[]).reduce((s,bk)=>s+(BAITS[bk]?.bonus||0),0);
  // Bregenz (Finale) erst betretbar, wenn alle 4 anderen Köder gesammelt sind
  function cityEntryGate(city){
    if(city.id==="bregenz"){
      const need=["wurm","insekt","spinner","blinker"];
      const have=player?.baits||[];
      const missing=need.filter(b=>!have.includes(b));
      if(missing.length>0) return `🔒 Bregenz versiegelt! Erst alle ${need.length} Köder sammeln (${need.length-missing.length}/${need.length}).`;
    }
    return null;
  }

  return(
    <div style={{width:"100%",height:"100dvh",overflow:"hidden",fontFamily:"'Press Start 2P',monospace",background:"#020c18"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');*{box-sizing:border-box;margin:0;padding:0}button{cursor:pointer}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0e4a7a}@keyframes monIdle{from{transform:translateY(0)}to{transform:translateY(-5px)}}`}</style>
      {scr==="title"    &&<TitleScreen onNewGame={startNew} onLoad={loadGame} savedName={savedName}/>}
      {scr==="character"&&<CharacterScreen onDone={onCharDone}/>}
      {scr==="dialogue" &&dlg&&<DialogueScreen state={dlg} playerName={player?.name} playerGender={player?.gender} onNext={nextDlg}/>}
      {scr==="overworld"&&player&&<OverworldScreen player={player} onEnterTown={enterTown} onWild={owWild} onMenu={()=>setShowMenu(true)} canEnter={cityEntryGate} onWalox={startWalox}/>}
      {scr==="city"     &&curCity&&player&&<CityInterior city={curCity} player={player} beaten={player.beaten.includes(curCity.id)} onArena={()=>fightTrainer(curCity)} onCenter={centerHeal} onFish={()=>go("fishing")} onExit={exitCity} onMenu={()=>setShowMenu(true)} onSwitch={unlockWalox}/>}
      {scr==="fishing"  &&curCity&&player&&<FishingScreen city={curCity} baitBonus={baitBonus} onCaught={onFishCaught} onBack={()=>go("city")}/>}
      {scr==="battle"   &&battle&&player&&<BattleScreen data={battle} player={player} onWin={onBattleWin} onLose={onGameOver}/>}
      {scr==="bregenzwin"&&<CreditsScreen onRestart={continueAfterBregenz}/>}
      {scr==="legend"   &&<LegendScreen onRestart={()=>{deleteSave();setPlayer(null);setSavedName(null);go("title");}}/>}
      {showMenu&&player&&<MenuScreen player={player} onClose={()=>setShowMenu(false)} onSave={doSave}/>}
    </div>
  );
}

try{
  const rootEl=document.getElementById('root');
  const root = ReactDOM.createRoot(rootEl);
  root.render(<AquariumMon/>);
  const l=document.getElementById('loading'); if(l)l.style.display='none';
}catch(e){
  showErr(e.message||String(e));
}
</script>

<script>
// If after 6s React/Babel never ran (e.g. blocked CDN), surface a helpful message
setTimeout(function(){
  if(window.__failed)return;
  if(typeof React==='undefined'||typeof ReactDOM==='undefined'){showErr('React/Babel wurden nicht geladen (CDN blockiert?). Seite neu laden oder anderes Netz versuchen.');return;}
  var l=document.getElementById('loading');
  if(l&&l.style.display!=='none'){showErr('Das Spiel konnte nicht initialisiert werden. Bitte Seite neu laden.');}
},6000);
</script>
</body>
</html>
